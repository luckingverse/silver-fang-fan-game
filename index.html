<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* ── TOUCH CONTROLS — overlaid on canvas ── */
#touch-ui{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;

  z-index:100;
}
.touch-btn{
  position:absolute;

  flex-direction:column;
  color:rgba(255,255,255,.55);
  font:bold 13px Georgia;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  backdrop-filter:none;
}

  background:rgba(255,210,60,.22);
  border-color:rgba(255,210,60,.7);
  color:rgba(255,255,255,.9);
}

/* WORLDS — top-left, small and unobtrusive */

             background:rgba(160,50,10,.35);border-color:rgba(220,80,20,.4);}

  /* Bottom-right: actions */
  #btn-jump {width:78px;height:78px; right:14px;  bottom:148px;
             background:rgba(20,60,160,.35);border-color:rgba(60,140,255,.45);}
  #btn-bite {width:66px;height:66px; right:102px; bottom:158px;
             background:rgba(140,100,10,.35);border-color:rgba(220,170,30,.4);}

             background:rgba(10,90,130,.35);border-color:rgba(60,180,230,.4);}

@media (orientation:landscape){

  #btn-down {width:62px;height:62px; left:57px;  bottom:24px;
             background:rgba(160,50,10,.35);border-color:rgba(220,80,20,.4);}

  /* Bottom-right: actions */
  #btn-jump {width:80px;height:80px; right:14px;  bottom:104px;
             background:rgba(20,60,160,.35);border-color:rgba(60,140,255,.45);}

             background:rgba(140,100,10,.35);border-color:rgba(220,170,30,.4);}
  #btn-spin {width:68px;height:68px; right:104px; bottom:36px;
             background:rgba(10,90,130,.35);border-color:rgba(60,180,230,.4);}
  #btn-army {width:68px;height:68px; right:14px;  bottom:28px;
             background:rgba(120,100,10,.35);border-color:rgba(200,180,30,.4);}

             background:rgba(120,70,10,.35);border-color:rgba(200,130,30,.4);}

             background:rgba(20,20,40,.6);border-color:rgba(140,140,200,.4);}

<body>
<div id="game-wrap">
<canvas id="c" width="800" height="480" tabindex="0"></canvas>
</div>
<div id="k">A/D Run | W/Space Jump | X Bite | Z Battouga | C Army | ↓+Air Ground Pound | B Vending Machine</div>

<!-- Touch controls — shown only on touch devices -->
<div id="touch-ui">

  <div class="touch-btn" id="btn-pause">⏸<br><span style="font-size:9px">PAUSE</span></div>

<script>
const CV=document.getElementById('c'),ctx=CV.getContext('2d');
const W=800,H=480,TILE=32,ROWS=15,LCOLS=330;

const VERSION='1.0.0'; // I120
// I124: haptic helper
function hap(ms){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
const keys={},just={};

// ── AUDIO ENGINE ──────────────────────────────────────
const AU=(()=>{
  let ac=null,muted=false;
  function init(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();}
  function resume(){if(ac&&ac.state==='suspended')ac.resume();}

  function play(type){
    if(muted)return;
    try{
      init();resume();
      const t=ac.currentTime;
      switch(type){

        case'jump':{
          // Short snappy rising tone
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='square';o.frequency.setValueAtTime(220,t);
          o.frequency.exponentialRampToValueAtTime(440,t+.08);
          g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
          o.start(t);o.stop(t+.12);break;
        }

        case'bite':{
          // Sharp attack click + noise burst
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sawtooth';o.frequency.setValueAtTime(180,t);
          o.frequency.exponentialRampToValueAtTime(60,t+.06);
          g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
          o.start(t);o.stop(t+.08);break;
        }

        case'spin':{
          // Rising whoosh
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(300,t);
          o.frequency.exponentialRampToValueAtTime(900,t+.2);
          g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
          o.start(t);o.stop(t+.22);break;
        }

        // poundland sound defined below (3-layer boom version)
        // boss and army sounds defined further below
        case'stomp':{
          // Satisfying thud
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(120,t);
          o.frequency.exponentialRampToValueAtTime(40,t+.12);
          g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);
          o.start(t);o.stop(t+.14);break;
        }

        case'pound':{
          // Deep boom
          const o=ac.createOscillator(),g=ac.createGain();
          const o2=ac.createOscillator(),g2=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o2.connect(g2);g2.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(80,t);
          o.frequency.exponentialRampToValueAtTime(25,t+.25);
          g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);
          o2.type='square';o2.frequency.setValueAtTime(60,t);
          o2.frequency.exponentialRampToValueAtTime(20,t+.15);
          g2.gain.setValueAtTime(.2,t);g2.gain.exponentialRampToValueAtTime(.001,t+.18);
          o.start(t);o.stop(t+.28);o2.start(t);o2.stop(t+.18);break;
        }

        case'coin':{
          // Bright ding
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(880,t);
          o.frequency.exponentialRampToValueAtTime(1320,t+.04);
          g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
          o.start(t);o.stop(t+.18);break;
        }

        case'powerup':{
          // Ascending 3-note chime
          [440,550,660,880].forEach((f,i)=>{
            const o=ac.createOscillator(),g=ac.createGain();
            o.connect(g);g.connect(ac.destination);
            o.type='sine';o.frequency.setValueAtTime(f,t+i*.08);
            g.gain.setValueAtTime(.18,t+i*.08);
            g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.15);
            o.start(t+i*.08);o.stop(t+i*.08+.15);
          });break;
        }

        case'giga':{
          // Epic ascending fanfare
          [220,277,330,440,554,660].forEach((f,i)=>{
            const o=ac.createOscillator(),g=ac.createGain();
            o.connect(g);g.connect(ac.destination);
            o.type='square';o.frequency.setValueAtTime(f,t+i*.07);
            g.gain.setValueAtTime(.15,t+i*.07);
            g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.18);
            o.start(t+i*.07);o.stop(t+i*.07+.2);
          });break;
        }

        case'hit':{
          // Low buzz + click when Gin takes damage
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sawtooth';o.frequency.setValueAtTime(80,t);
          g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);
          o.start(t);o.stop(t+.2);break;
        }

        case'death':{
          // Descending wail
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(440,t);
          o.frequency.exponentialRampToValueAtTime(110,t+.5);
          g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.55);
          o.start(t);o.stop(t+.55);break;
        }

        case'checkpoint':{
          // Gentle two-tone chime
          [660,880].forEach((f,i)=>{
            const o=ac.createOscillator(),g=ac.createGain();
            o.connect(g);g.connect(ac.destination);
            o.type='sine';o.frequency.setValueAtTime(f,t+i*.12);
            g.gain.setValueAtTime(.15,t+i*.12);
            g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.25);
            o.start(t+i*.12);o.stop(t+i*.12+.28);
          });break;
        }

        case'worldclear':{
          // Victory fanfare
          [330,392,494,659,784,988].forEach((f,i)=>{
            const o=ac.createOscillator(),g=ac.createGain();
            o.connect(g);g.connect(ac.destination);
            o.type='square';o.frequency.setValueAtTime(f,t+i*.09);
            g.gain.setValueAtTime(.14,t+i*.09);
            g.gain.exponentialRampToValueAtTime(.001,t+i*.09+.22);
            o.start(t+i*.09);o.stop(t+i*.09+.25);
          });break;
        }

        case'vend':{
          // Cash register click
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(1200,t);
          o.frequency.exponentialRampToValueAtTime(600,t+.05);
          g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
          o.start(t);o.stop(t+.08);break;
        }

        case'growl':{
          // Enemy growl — low short rumble
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sawtooth';o.frequency.setValueAtTime(55+Math.random()*30,t);
          o.frequency.exponentialRampToValueAtTime(30,t+.18);
          g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);
          o.start(t);o.stop(t+.2);break;
        }

        case'wolfhowl':{
          // Wolf howl — rising then falling
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(200,t);
          o.frequency.exponentialRampToValueAtTime(600,t+.3);
          o.frequency.exponentialRampToValueAtTime(350,t+.6);
          g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.65);
          o.start(t);o.stop(t+.65);break;
        }

        case'bossroar':{
          // Boss roar — deep multi-layer
          [[80,.35],[55,.25],[110,.2]].forEach(([f,v],i)=>{
            const o=ac.createOscillator(),g=ac.createGain();
            o.connect(g);g.connect(ac.destination);
            o.type=i===2?'sine':'sawtooth';
            o.frequency.setValueAtTime(f,t);
            o.frequency.exponentialRampToValueAtTime(f*.4,t+.6);
            g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.7);
            o.start(t);o.stop(t+.7);
          });break;
        }

        case'spinloop':{
          // Ongoing spin hum — short whoosh for looping
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sine';o.frequency.setValueAtTime(400,t);
          o.frequency.exponentialRampToValueAtTime(700,t+.08);
          o.frequency.exponentialRampToValueAtTime(400,t+.16);
          g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
          o.start(t);o.stop(t+.18);break;
        }

        case'poundland':{
          // Massive ground pound landing — 3-layer boom
          [[40,.5],[70,.35],[100,.2]].forEach(([f,v],i)=>{
            const o=ac.createOscillator(),g=ac.createGain();
            o.connect(g);g.connect(ac.destination);
            o.type=i===0?'sine':'square';
            o.frequency.setValueAtTime(f,t);
            o.frequency.exponentialRampToValueAtTime(f*.2,t+.35);
            g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
            o.start(t);o.stop(t+.4);
          });break;
        }

        case'army':{
          // Trumpet-ish call
          [392,494,392,494,659].forEach((f,i)=>{
            const o=ac.createOscillator(),g=ac.createGain();
            o.connect(g);g.connect(ac.destination);
            o.type='square';o.frequency.setValueAtTime(f,t+i*.06);
            g.gain.setValueAtTime(.12,t+i*.06);
            g.gain.exponentialRampToValueAtTime(.001,t+i*.06+.1);
            o.start(t+i*.06);o.stop(t+i*.06+.12);
          });break;
        }

        case'boss':{
          // Heavy hit on boss
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.type='sawtooth';o.frequency.setValueAtTime(150,t);
          o.frequency.exponentialRampToValueAtTime(50,t+.2);
          g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
          o.start(t);o.stop(t+.22);break;
        }
      }
    }catch(e){}
  }

  // ── BACKGROUND MUSIC ─────────────────────────────────
  // Each world gets a unique chiptune feel: base note, scale pattern, tempo, wave type
  const BGM_THEMES=[
    null, // index 0 unused
    {root:220, scale:[0,2,4,7,9],    tempo:0.32, wave:'square',  bass:55,  name:'mountain'},   // W1
    {root:196, scale:[0,2,3,7,10],   tempo:0.28, wave:'sine',    bass:49,  name:'snow'},        // W2
    {root:185, scale:[0,1,3,5,8],    tempo:0.38, wave:'sawtooth',bass:46,  name:'dark'},        // W3
    {root:233, scale:[0,2,4,6,9],    tempo:0.22, wave:'square',  bass:58,  name:'volcanic'},    // W4
    {root:175, scale:[0,1,4,6,8],    tempo:0.35, wave:'sawtooth',bass:44,  name:'abyss'},       // W5
    {root:208, scale:[0,2,5,7,9],    tempo:0.25, wave:'square',  bass:52,  name:'storm'},       // W6
    {root:165, scale:[0,3,5,6,8],    tempo:0.40, wave:'sine',    bass:41,  name:'ghost'},       // W7
    {root:247, scale:[0,2,4,7,11],   tempo:0.20, wave:'sine',    bass:62,  name:'crystal'},     // W8
    {root:262, scale:[0,2,4,5,9],    tempo:0.18, wave:'square',  bass:65,  name:'sky'},         // W9
    {root:155, scale:[0,1,3,6,8],    tempo:0.42, wave:'sawtooth',bass:39,  name:'summit'},      // W10
  ];
  let bgmInterval=null,bgmStep=0,bgmWorld=0,bgmBossMode=false;
  const bgmVol=0.055;

  function bgmNote(freq,dur,waveType,vol){
    if(muted||!ac)return;
    try{
      const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain();
      // Subtle reverb via delay
      const delay=ac.createDelay(.08);
      const dg=ac.createGain();dg.gain.value=0.18;
      o.connect(g);g.connect(ac.destination);
      g.connect(delay);delay.connect(dg);dg.connect(ac.destination);
      o.type=waveType;o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(vol,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur*.9);
      o.start(t);o.stop(t+dur);
    }catch(e){}
  }

  // Melody patterns per theme — indices into scale array
  const MELODIES={
    mountain: [0,2,4,2,3,1,0,4,2,3,4,2,1,0,2,1],
    snow:     [2,4,3,4,2,0,1,3,4,3,2,1,0,2,3,4],
    dark:     [0,1,0,3,1,0,4,1,3,0,1,4,0,3,1,0],
    volcanic: [4,3,4,2,4,1,3,0,4,3,2,4,1,3,0,4],
    abyss:    [0,3,1,4,0,2,3,1,4,2,0,3,1,0,4,2],
    storm:    [2,4,2,0,3,1,4,2,0,3,4,2,1,0,3,2],
    ghost:    [0,2,4,3,4,2,0,1,4,2,3,4,0,2,1,4],
    crystal:  [4,2,0,3,1,4,2,1,3,0,4,2,1,0,3,4],
    sky:      [0,2,4,2,4,3,2,0,4,2,3,4,2,1,0,2],
    summit:   [0,1,4,3,1,0,4,1,3,0,1,3,4,0,3,1],
  };

  function bgmTick(th){
    if(muted)return;
    const freqs=th.scale.map(s=>th.root*Math.pow(2,s/12));
    const mel=MELODIES[th.name]||MELODIES.mountain;
    const idx=bgmStep%mel.length;
    const note=freqs[mel[idx]%freqs.length];
    const oct=bgmStep%4===0?0.5:bgmStep%2===0?1:2; // octave variation
    bgmNote(note*oct,th.tempo*.85,th.wave,bgmBossMode?bgmVol*1.4:bgmVol);
    // Bass pulse every 4 steps
    if(bgmStep%4===0)bgmNote(th.bass,th.tempo*1.8,'sine',bgmBossMode?bgmVol*.9:bgmVol*.6);
    // Harmony on boss
    if(bgmBossMode&&bgmStep%8===0)bgmNote(note*1.5,th.tempo*.7,th.wave,bgmVol*.5);
    bgmStep++;
  }

  function bgmStart(worldNum,bossMode){
    bgmStop();
    const th=BGM_THEMES[Math.min(worldNum,10)];
    if(!th)return;
    bgmWorld=worldNum;bgmBossMode=bossMode;bgmStep=0;
    if(muted)return;
    bgmInterval=setInterval(()=>bgmTick(th),th.tempo*1000);
  }
  function bgmStop(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}
  function bgmBoss(on){bgmBossMode=on;if(on){bgmStop();bgmStart(bgmWorld,true);}}
  function bgmSetMuted(m){muted=m;if(m)bgmStop();else bgmStart(bgmWorld,bgmBossMode);}

  function toggleMute(){muted=!muted;if(muted)bgmStop();else bgmStart(bgmWorld,bgmBossMode);return muted;}
  return{play,toggleMute,init,resume,bgmStart,bgmStop,bgmBoss,get muted(){return muted;}};
})();
const GAME_KEYS=['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab','Backquote','KeyA','KeyD','KeyW','KeyS','KeyX','KeyZ','KeyC','KeyB','KeyQ','KeyM','KeyP','KeyK','Enter','Escape','Backspace'];
document.addEventListener('keydown',e=>{
  AU.resume();
  // Don't block typing keys when entering name or leaderboard name
  if((state==='nameentry'||( state==='leaderboard'&&lbEntering))&&(e.code.startsWith('Key')||e.code.startsWith('Digit')||e.code==='Minus'||e.code==='Space'||e.code==='Backspace'||e.code==='Enter')){}
  else if(GAME_KEYS.includes(e.code))e.preventDefault();
  if(!keys[e.code])just[e.code]=true;
  keys[e.code]=true;
});

// ── UNIFIED CLICK / TAP HANDLER ───────────────────────
function handleUIClick(gx,gy){
  // Name entry
  if(state==='nameentry'){
    if(lbNameInput.trim().length>0){
      playerName=lbNameInput.trim().slice(0,12);
      try{localStorage.setItem('ginga_name',playerName);}catch(e){}
      state=firstLaunch?'howtoplay':'title';
    }
    return;
  }

  // How to play
  if(state==='howtoplay'){state='title';return;}

  // Title screen
  if(state==='title'){
    if(easterEggOpen){easterEggOpen=false;return;}
    if(hitBtn('easter_egg',gx,gy)){easterEggOpen=true;return;}
    if(hitBtn('lb_btn',gx,gy)){state='leaderboard';return;}
    if(hitBtn('lobby_btn',gx,gy)){openLobbyFromTitle();return;}
    if(hitBtn('htp_btn',gx,gy)){state='howtoplay';return;}
    if(hitBtn('play_btn',gx,gy)){startGame();return;}
    // Fallback: anywhere = play
    startGame();return;
  }

  // Intro — skip
  if(state==='intro'){skipIntro();return;}

  // Lobby
  if(state==='lobby'){
    // Tab buttons
    for(let t=0;t<4;t++){if(hitBtn('tab'+t,gx,gy)){shopTab=t;shopCursor=0;return;}}
    // Play / Continue buttons
    if(hitBtn('play',gx,gy)||hitBtn('cont',gx,gy)){continueFromShop();return;}
    // Upgrades tab
    if(shopTab===0){
      const tk=UKEYS.filter(k=>UPG[k].tier==='perm');
      for(let i=0;i<tk.length;i++){if(hitBtn('upg'+i,gx,gy)){
        shopCursor=i;const k=tk[i],u=UPG[k];
        if(coinBank>=u.cost&&u.owned<u.max){coinBank-=u.cost;u.owned++;burst(W/2,H/2,20,'#F0C840',6);AU.play('vend');}
        return;
      }}
    }
    // Buffs tab
    if(shopTab===1){
      const tk=UKEYS.filter(k=>UPG[k].tier==='buff');
      for(let i=0;i<tk.length;i++){if(hitBtn('buff'+i,gx,gy)){
        shopCursor=i;const k=tk[i],u=UPG[k];
        if(coinBank>=u.cost&&u.owned<u.max){coinBank-=u.cost;u.owned++;burst(W/2,H/2,20,'#F0C840',6);AU.play('vend');}
        return;
      }}
    }
    // Score skins tab
    if(shopTab===2){
      for(let i=0;i<SKINS.length;i++){if(hitBtn('sk'+i,gx,gy)){
        skinShopCursor=i;if(unlockedSkins.includes(i)){currentSkin=i;AU.play('vend');try{localStorage.setItem('ginga_skin_sel',currentSkin);}catch(e){}}
        return;
      }}
    }
    // Coin skins tab
    if(shopTab===3){
      if(hitBtn('csprev',gx,gy)){skinShopCursor=Math.max(0,skinShopCursor-1);return;}
      if(hitBtn('csnext',gx,gy)){skinShopCursor=Math.min(COIN_SKINS.length-1,skinShopCursor+1);return;}
      for(let i=0;i<COIN_SKINS.length;i++){if(hitBtn('cs'+i,gx,gy)){
        skinShopCursor=i;
        if(coinSkinOwned.has(i)){coinSkinSelected=coinSkinSelected===i?-1:i;AU.play('vend');}
        else{if(buyCoinSkin(i))burst(W/2,H/2,25,'#FFD700',8);}
        return;
      }}
    }
    return;
  }

  // Paused — handle pause menu buttons
  if(state==='playing'&&paused){
    if(hitBtn('pause_resume',gx,gy)){togglePause();return;}
    if(hitBtn('pause_mute',  gx,gy)){AU.toggleMute();return;}
    if(hitBtn('pause_lobby', gx,gy)){
      paused=false;clearInterval(timerID);AU.bgmStop();
      coinBank+=coins;coins=0;
      try{localStorage.setItem('ginga_coin_bank',coinBank);}catch(e){}
      state='lobby';shopTab=0;shopCursor=0;skinShopCursor=0;return;
    }
    return; // don't fall through to jump while paused
  }

  // Playing — tap = jump
  if(state==='playing'){
    // Pause button area (top-right corner on desktop too)
    if(gx>=W-56&&gy<=48){togglePause();return;}
    if(!paused)tryJump();
    return;
  }

  // Dead overlay buttons
  if(state==='dead'){
    if(hitBtn('retry_btn',gx,gy)){respawnInWorld();return;}
    if(hitBtn('shop_btn',gx,gy)){goLobby(2);return;}
    respawnInWorld();return;
  }

  // Gameover overlay buttons
  if(state==='gameover'){
    if(hitBtn('shop_btn',gx,gy)){goLobby(2);return;}
    startGame();return;
  }

  // Leaderboard
  if(state==='leaderboard'){
    if(lbEntering){
      if(hitBtn('lb_submit',gx,gy)){if(lbNameInput.trim().length>0)submitScore(lbNameInput);return;}
      if(hitBtn('lb_skip',gx,gy)){submitScore(lbNameInput||playerName||'Unknown');return;}
      // Mobile: tap name box → prompt
      if(gx>=W/2-120&&gx<=W/2+120&&gy>=126&&gy<=158){
        const n=prompt('Enter your name (max 12 chars):',lbNameInput);
        if(n!==null)lbNameInput=n.trim().slice(0,12);
      }
    }else{
      if(hitBtn('lb_play_btn',gx,gy)){startGame();return;}
      state='title';
    }
    return;
  }
}

      unlockedSkins.push(i);

let coinSkinOwned=new Set([]),coinSkinSelected=-1; // -1 = no coin skin active
function getCoinSkin(){return coinSkinSelected>=0?COIN_SKINS[coinSkinSelected]:null;}
function buyCoinSkin(idx){
  if(coinBank<COIN_SKINS[idx].cost)return false;
  coinBank-=COIN_SKINS[idx].cost;
  coinSkinOwned.add(idx);
  coinSkinSelected=idx;
  addMsg('🎨 '+COIN_SKINS[idx].name+' equipped!','#FFD700');
  // Save to localStorage
  try{localStorage.setItem('ginga_coin_skins',JSON.stringify([...coinSkinOwned]));
      localStorage.setItem('ginga_coin_sel',coinSkinSelected);
      localStorage.setItem('ginga_coin_bank',coinBank);}catch(e){}
  return true;
}
// Load saved coin skins
try{
  const saved=JSON.parse(localStorage.getItem('ginga_coin_skins')||'[]');
  coinSkinOwned=new Set(saved);
  const _cs=parseInt(localStorage.getItem('ginga_coin_sel')??'-1');
  coinSkinSelected=isNaN(_cs)?-1:_cs; // B322: guard against corrupted 'NaN' string
  const savedBank=parseInt(localStorage.getItem('ginga_coin_bank')||'0');
  if(savedBank>0)coinBank=savedBank;
}catch(e){}
// Daily login bonus
try{
  const today=new Date().toDateString();
  const lastLogin=localStorage.getItem('ginga_last_login')||'';
  const streak=parseInt(localStorage.getItem('ginga_streak')||'0');
  if(lastLogin!==today){
    const newStreak=lastLogin&&(new Date()-new Date(lastLogin))<172800000?streak+1:1;
    const bonus=10+Math.min(newStreak*2,20);
    coinBank+=bonus;
    localStorage.setItem('ginga_last_login',today);
    localStorage.setItem('ginga_streak',newStreak);
    localStorage.setItem('ginga_coin_bank',coinBank);
    // Store bonus message to display on title
    window._dailyBonus={coins:bonus,streak:newStreak};
  }
}catch(e){}
// Load saved score skins
try{
  const ss=JSON.parse(localStorage.getItem('ginga_skins')||'[0]');
  unlockedSkins=ss.filter(i=>Number.isInteger(i)&&i>=0&&i<SKINS.length);
  if(!unlockedSkins.includes(0))unlockedSkins.unshift(0);
  const ssel=parseInt(localStorage.getItem('ginga_skin_sel')||'0');
  if(unlockedSkins.includes(ssel))currentSkin=ssel;
}catch(e){}

function buildMap(lvl){
  map=[];bumped.clear();boxContents={};crumbleTiles={};
  for(let r=0;r<ROWS;r++){map[r]=[];for(let c=0;c<LCOLS;c++)map[r][c]='.';}
  const L=LAYOUTS[Math.min(lvl-1,9)];
  for(let c=0;c<LCOLS;c++)if(!L.gaps.some(([a,b])=>c>=a&&c<=b)){map[13][c]='G';map[14][c]='G';}
  for(const[r,c1,c2,t]of L.plats)for(let c=c1;c<=c2&&c<LCOLS;c++)map[r][c]=t;
  for(const[r,c1,c2]of(L.snows||[]))for(let c=c1;c<=c2&&c<LCOLS;c++)map[r][c]='S';
  for(const c of(L.spikes||[]))if(c<LCOLS)map[12][c]='K';
  for(const[pc,ph]of(L.trees||[])){if(pc+1>=LCOLS)continue;for(let r=13-ph;r<13;r++){map[r][pc]=r===13-ph?'T':'P';map[r][pc+1]=r===13-ph?'T':'P';}}
  checkpointX=(L.checkpoint||155)*TILE;checkpointReached=false;
  if(L.checkpoint<LCOLS-5){
    // Find the actual surface row at checkpoint column (scan down from row 8)
    let cpRow=12;
    for(let r=8;r<14;r++){if(solid(map[r][L.checkpoint])){cpRow=r-1;break;}}
    // If the ground floor is solid at that col, use row 12 (one above ground 13)
    if(map[13][L.checkpoint]==='G')cpRow=12;
    // Place flag and vending machine on a guaranteed solid base — use row cpRow+1 as floor
    // Make a small 2-tile platform if nothing exists there
    if(!solid(map[cpRow+1][L.checkpoint])){
      map[cpRow+1][L.checkpoint]='R';map[cpRow+1][L.checkpoint+1]='R';
      map[cpRow+1][L.checkpoint+3]='R';map[cpRow+1][L.checkpoint+4]='R';
    }
    map[cpRow][L.checkpoint]='V';
    map[cpRow][L.checkpoint+3]='M';
  }
  const pool=[...PPOOL];for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}let pi=0; // B307: Fisher-Yates
  for(const[r,c]of L.boxes)if(c<LCOLS&&r>=0){map[r][c]='Q';boxContents[r+','+c]=Math.random()<.35?'COIN':pool[pi++%pool.length];}
  // Tower door — placed near end of world, guaranteed solid ground beneath
  const doorCol=LCOLS-28;
  // Solid ground under and behind door
  for(let r=0;r<ROWS;r++)for(let c=doorCol;c<LCOLS;c++)map[r][c]='G';
  // Clear the door opening: 4 tiles tall, 2 tiles wide (rows 9-12, doorCol to doorCol+1)
  for(let r=9;r<=12;r++){map[r][doorCol]='.';map[r][doorCol+1]='.';}
  // Single marker at top-left of opening — used to draw the door visual
  map[9][doorCol]='D';
  bossSpawnX=(LCOLS-22)*TILE; // kept for compatibility
}

let map=[],boxContents={},bossSpawnX=0;
function sg(r,c){
  if(inArena) return arenasg(r,c);
  return(map[r]&&map[r][c])||'.';
}
function solid(t){return'GRBQUSTPKVMC'.includes(t);}
function breakable(t){return'RBS'.includes(t);}

// ── PLAYER ────────────────────────────────────────────
let P={};
function gW(){return P.big?42:28;}
function gH(){return P.big?(P.ducking?26:46):(P.ducking?18:30);}
function resetP(){
  const sx=checkpointReached?checkpointX+TILE:80;
  P={x:sx,y:10*TILE,vx:0,vy:0,ground:false,jumps:2,facing:1,dead:false,dTimer:0,inv:0,
     big:false,giga:false,gigaTimer:0,armor:false,ducking:false,groundPound:false,wasAirborne:false,armyStored:0,
     spinStored:0,spinActive:false,spinTimer:0,spinAngle:0,momentum:1,
     howlActive:false,howlTimer:0,rallyActive:false,rallyTimer:0,
     speedActive:false,speedTimer:0,speedPerm:false,biteActive:false,biteTimer:0};
}
function applyUpg(){
  if(UPG.startBig.owned)P.big=true;
  P.jumps=UPG.tripleJump.owned?3:2;
  lives=3+UPG.extraLife.owned;
  if(UPG.speedBuff.owned){P.speedActive=true;P.speedTimer=9999;P.speedPerm=true;UPG.speedBuff.owned=0;}
  if(UPG.armorBuff.owned){P.armor=true;UPG.armorBuff.owned=0;}
  wbFang=UPG.fangBuff.owned?14:0;if(UPG.fangBuff.owned)UPG.fangBuff.owned=0;
  wbTime=UPG.timeBuff.owned?180:0;if(UPG.timeBuff.owned)UPG.timeBuff.owned=0;
  while(UPG.spinBuff.owned>0){P.spinStored=Math.min(P.spinStored+1,3);UPG.spinBuff.owned--;}
}
function dur(){return wbTime;}

function smashTile(r,c){
  const key=r+','+c,t=sg(r,c);if(bumped.has(key)||!breakable(t))return;
  if(t==='R'&&!P.big){floatUp('Need Big Sol!',c*TILE+16,r*TILE,'#C0A060');return;}
  bumped.add(key);map[r][c]='.';
  burst(c*TILE+16,r*TILE+16,10,t==='S'?'#DDD':t==='B'?'#6A9030':'#9A7848',5);
  floatUp(P.big?'SMASH!':'crack!',c*TILE+16,r*TILE,P.big?'#FF8800':'#C0A060');
  score+=P.big?80:30;screenShake=P.big?7:3;
}
function onBump(r,c,t){
  const key=r+','+c;if(bumped.has(key))return;
  if(t==='Q'){
    bumped.add(key);map[r][c]='U';bumpAnims.push({c,r,t:12});
    const ct=boxContents[key]||'COIN';
    if(ct==='COIN'){coins++;coinBank++;score+=200;burst(c*TILE+16,r*TILE,8,'#F0C840',4);floatUp('+1🪙',c*TILE+16,r*TILE-8,'#F0C840');AU.play('coin');spawnItem(c*TILE,r*TILE-48,'COIN');}
    else{spawnItem(c*TILE,r*TILE-56,ct);burst(c*TILE+16,r*TILE,12,PCOL[ct]||'#FFF',5);}
  }else if(breakable(t))smashTile(r,c);
}
function resolve(e,isP){
  const ew=isP?gW():e.w,eh=isP?gH():e.h;
  e.x+=e.vx;
  {const L2=Math.floor(e.x/TILE),R2=Math.floor((e.x+ew-1)/TILE),T2=Math.floor(e.y/TILE),B2=Math.floor((e.y+eh-1)/TILE);
  for(let r=T2;r<=B2;r++){
    if(e.vx>0&&solid(sg(r,R2))){e.x=R2*TILE-ew;e.vx=isP?0:-Math.abs(e.vx);break;}
    if(e.vx<0&&solid(sg(r,L2))){e.x=(L2+1)*TILE;e.vx=isP?0:Math.abs(e.vx);break;}
  }}
  e.y+=e.vy;e.ground=false;
  {const L2=Math.floor(e.x/TILE),R2=Math.floor((e.x+ew-1)/TILE),T2=Math.floor(e.y/TILE),B2=Math.floor((e.y+eh-1)/TILE);
  if(e.vy>=0){for(let c=L2;c<=R2;c++){const tl=sg(B2,c);if(solid(tl)){e.y=B2*TILE-eh;e.vy=0;e.ground=true;
    if(isP){P.jumps=UPG.tripleJump.owned?3:2;
      if(tl==='K')killP();
      if(tl==='V'&&!checkpointReached){checkpointReached=true;addMsg('CHECKPOINT REACHED! ✓','#50FF80');burst(P.x+gW()/2,P.y,20,'#50FF80',8);AU.play('checkpoint');}
      if(tl==='M'){vendNearby=true;}
      // Also detect M one tile to the left or right (standing beside machine)
      const adjL=sg(B2,Math.floor(e.x/TILE)-1),adjR=sg(B2,Math.floor((e.x+ew-1)/TILE)+1);
      if(adjL==='M'||adjR==='M')vendNearby=true;
      {const ag=inArena?(ARENA_DEFS[Math.min(world-1,9)].gimmick||null):th().gimmick;if((ag==='crumble'||ag==='all')&&(tl==='R'||tl==='B'||tl==='S')){const ck=B2+','+c;if(!crumbleTiles[ck])crumbleTiles[ck]=90;}}
    }break;}}}
  else{for(let c=L2;c<=R2;c++){if(solid(sg(T2,c))){e.y=(T2+1)*TILE;e.vy=0;if(isP)onBump(T2,c,sg(T2,c));break;}}}}
}

// ── ATTACKS ───────────────────────────────────────────
function tryBite(){
  if(P.dead||P.biteTimer>0)return;
  // Door entry is triggered by walking in (see movement section below)
  AU.play('bite');
  P.biteActive=true;P.biteTimer=18;
  const d=P.facing,bw=gW(),bh=gH();
  burst(P.x+(d>0?bw+6:-10),P.y+bh*.4,8,'#E8C060',4);
  const fc=d>0?Math.floor((P.x+bw)/TILE):Math.floor((P.x-1)/TILE);
  const tr2=Math.floor(P.y/TILE),br2=Math.floor((P.y+bh-1)/TILE);
  let hit=false;
  for(let r=tr2;r<=br2&&!hit;r++){const t=sg(r,fc),k=r+','+fc;if(!bumped.has(k)){if(t==='Q'){onBump(r,fc,t);hit=true;}else if(breakable(t)){smashTile(r,fc);hit=true;}}}
  if(!hit){const ar=Math.floor((P.y-1)/TILE),mc=Math.floor((P.x+bw/2)/TILE),t=sg(ar,mc),k=ar+','+mc;if(!bumped.has(k)&&(t==='Q'||breakable(t)))onBump(ar,mc,t);}
  const rng=48+wbFang;
  for(const e of [...enemies,...wolfPack]){if(!e.alive||e.squished)continue;if(Math.abs(e.x+e.w/2-P.x-bw/2)<rng&&Math.abs(e.y+e.h/2-P.y-bh/2)<bh*.9)if((d>0&&e.x+e.w/2>P.x)||(d<0&&e.x+e.w/2<P.x+bw))defeat(e,'BITE');}
  // Bite can also hit the boss — close-range, requires facing toward boss body
  if(bossActive&&boss&&boss.alive&&!P.dead){
    const bossHorOk=Math.abs(boss.x+boss.w/2-(P.x+bw/2))<boss.w/2+rng;
    const bossVertOk=P.y+bh/2>boss.y+boss.h*.15&&P.y+bh/2<boss.y+boss.h*.9; // B300: use center
    const bossFaceOk=(d>0&&P.x+bw/2<boss.x+boss.w/2)||(d<0&&P.x+bw/2>boss.x+boss.w/2);
    if(bossHorOk&&bossVertOk&&bossFaceOk){
      const bd=UPG.rikiFang.owned?2:1;
      boss.hp-=bd;bossHurt();
      P.inv=28; // brief invincibility so bite doesn't instantly trigger return damage
      P.vx=-P.facing*3; // small knockback away from boss
      burst(P.x+bw/2+(d>0?rng/2:-rng/2),P.y+bh*.4,10,'#E8C060',5);
      floatUp('BITE! -'+bd,boss.x+boss.w/2,boss.y-15,'#E8C060');
      if(boss.hp<=0)bossDie();
    }
  }
}

function buildEnemies(lvl){

  }

  }

    enemies.push({x:c*TILE,y:11*TILE,w:50,h:48,vx:-(spd*.65),vy:0,ground:false,alive:true,squished:false,sTimer:0,frozen:0,inv:0,type:'bigbear',hp:Math.max(2,Math.ceil(lvl/2)),shooter:Math.random()<sChance+.15,scd:Math.floor(Math.random()*120)+60,sint:Math.max(50,90-lvl*8),ghost:false});

    enemies.push({x:c*TILE,y:11*TILE,w:32,h:32,vx:-(spd*1.4),vy:0,ground:false,alive:true,squished:false,sTimer:0,frozen:0,inv:0,type:'shadow',hp:2,shooter:true,scd:60,sint:Math.max(40,75-lvl*5),ghost:false});

  }

function defeat(e,method){
  if(!e.alive||e.squished)return;
  if((e.type==='armbear'||e.type==='bigbear')&&method==='BITE'&&e.hp>1){e.hp--;burst(e.x+e.w/2,e.y+e.h/2,6,'#C0A890',3);floatUp('TOUGH!',e.x+e.w/2,e.y,'#C0B080');e.inv=30;AU.play('bite');return;}
  e.squished=true;e.sTimer=40;
  if(method==='STOMP')AU.play('stomp');
  else if(method==='SPIN')AU.play('spin');
  else if(method==='BITE')AU.play('bite');
  else AU.play('stomp');
  const basePts={armbear:500,shadow:350,bigbear:400,bear:200,rogue:150,bat:250}[e.type]||200;
  comboCount++;comboTimer=150; // 2.5s window at 60fps
  const comboMult=Math.min(1+Math.floor(comboCount/2)*.25,2.5);
  const pts=Math.round(basePts*comboMult);
  score+=pts;checkSkinUnlocks();
  if(comboCount>=3){const comboLabel=comboCount>=8?'LEGENDARY COMBO! ×'+comboCount:comboCount>=5?'FANG STORM! ×'+comboCount:'COMBO ×'+comboCount;addMsg(comboLabel,'#FFDD44');}
  burst(e.x+e.w/2,e.y+e.h/2,method==='SPIN'?18:10,e.type==='shadow'?'#8844FF':e.type==='bat'?'#4488CC':'#CC4400',method==='SPIN'?9:5);
  floatUp('+'+pts+(method==='SPIN'?' SPIN!':method==='BITE'?' FANG!':''),e.x+e.w/2,e.y-10,'#FFCC44');
  screenShake=Math.min(screenShake+3,12);
  // Coin drops: higher-tier enemies drop more reliably
  const coinDrop={armbear:.5,bigbear:.45,shadow:.35,bat:.3,bear:.18,rogue:.12}[e.type]||.15;
  if(Math.random()<coinDrop){spawnItem(e.x+e.w/2-16,e.y,'COIN');}
}
function shootFB(src,angleOff){
  if(fireballs.length>20)return;
  const dir=src.vx<=0?-1:1;
  const spd2=world>=7?5.8:world>=4?4.5:3.2;
  const vx=(dir*spd2)*Math.cos(angleOff||0)-(Math.sin(angleOff||0)*2);
  const vy=Math.sin(angleOff||0)*spd2-(angleOff?2:0);
  const col=world>=7?'#FF0060':world>=4?'#FF3000':'#FF8800';
  fireballs.push({x:src.x+(dir>0?src.w:0),y:src.y+src.h*.4,vx,vy,life:120,col,sz:world>=7?12:world>=4?10:7});
}
function throwRock(src){
  const dir=src.vx<=0?-1:1;
  rocks.push({x:src.x+src.w/2,y:src.y,vx:dir*(5+world*.5),vy:-8,life:200,r:14});
  floatUp('🪨',src.x+src.w/2,src.y-20,'#C09870');

function updFB(){
  for(let i=fireballs.length-1;i>=0;i--){
    const fb=fireballs[i];fb.x+=fb.vx;fb.y+=fb.vy;fb.vy+=.15;fb.life--;
    const fbMaxX=inArena?ARENA_COLS*TILE:LCOLS*TILE;
    if(fb.x<0||fb.x>fbMaxX||solid(sg(Math.floor((fb.y+fb.sz)/TILE),Math.floor(fb.x/TILE)))||fb.life<=0){burst(fb.x,fb.y,7,fb.col,4);fireballs.splice(i,1);continue;}
    if(!P.dead&&P.inv<=0&&!P.rallyActive&&P.x<fb.x+fb.sz&&P.x+gW()>fb.x&&P.y<fb.y+fb.sz&&P.y+gH()>fb.y){burst(fb.x,fb.y,12,fb.col,5);fireballs.splice(i,1);P.inv=1;killP();}
  }
}
function updRocks(){
  for(let i=rocks.length-1;i>=0;i--){
    const rb=rocks[i];rb.x+=rb.vx;rb.y+=rb.vy;rb.vy+=.4;rb.life--;
    const _rFloor=inArena&&!(ARENA_DEFS[Math.min(world-1,9)].floor)?H+20:13*TILE;
    if(rb.y+rb.r>=_rFloor&&rb.vy>0){rb.vy*=-.45;rb.vx*=.8;}
    const rbMaxX=inArena?ARENA_COLS*TILE:LCOLS*TILE;
    if(rb.x<0){rb.x=0;rb.vx=Math.abs(rb.vx);}
    if(rb.x>rbMaxX){rb.x=rbMaxX;rb.vx=-Math.abs(rb.vx);}
    if(rb.life<=0||rb.y>H+50){rocks.splice(i,1);continue;}
    if(!P.dead&&P.inv<=0&&!P.rallyActive&&Math.hypot(rb.x-(P.x+gW()/2),rb.y-(P.y+gH()/2))<rb.r+14){burst(rb.x,rb.y,14,'#C09870',5);rocks.splice(i,1);P.inv=1;killP();}
  }
}

function buildArena(w){
  const def=ARENA_DEFS[Math.min(w-1,9)];
  arenaMap=[];
  for(let r=0;r<ROWS;r++){arenaMap[r]=[];for(let c=0;c<ARENA_COLS;c++)arenaMap[r][c]='.';}
  // Floor
  if(def.floor){
    for(let c=0;c<ARENA_COLS;c++){
      if(!def.holes||!def.holes.some(([a,b])=>c>=a&&c<=b)){
        arenaMap[13][c]='G';arenaMap[14][c]='G';
      }
    }
  }
  // Platforms
  for(const[r,c1,c2] of (def.plats||[])){
    for(let c=c1;c<=c2&&c<ARENA_COLS;c++) arenaMap[r][c]='R';
  }
  // Left/right stone walls
  for(let r=0;r<ROWS;r++){arenaMap[r][0]='G';arenaMap[r][1]='G';arenaMap[r][ARENA_COLS-1]='G';arenaMap[r][ARENA_COLS-2]='G';}
  // Ceiling
  for(let c=0;c<ARENA_COLS;c++)arenaMap[0][c]='G';
  // NOTE: no extra wall tiles needed — right wall (cols 23-24) bounds the portal area
}

function arenasolid(r,c){
  if(r<0||r>=ROWS||c<0||c>=ARENA_COLS)return true;
  return solid((arenaMap[r]&&arenaMap[r][c])||'.');
}

function startTransition(cb){
  if(transitionDir!==0)return; // already transitioning, ignore
  transitionDir=1;transitionAlpha=0;
  transitionCb=()=>{cb();transitionDir=-1;};
}
function enterBossTower(){

    arenaExitOpen=false;

function arenasg(r,c){
  const t=(arenaMap[r]&&arenaMap[r][c])||'.';
  // Ghost platforms: passable when nearly invisible (W6 arena ghostplats)
  if(t==='R'&&inArena&&ARENA_DEFS[Math.min(world-1,9)].gimmick==='ghostplats'){
    if(Math.sin(frame*.04+c*.8)<-0.7)return '.';
  }
  return t;
}

function updateAkaguma(){

  boss.chargeT--;if(!boss.chargeT&&boss.ground&&akaPhase<3){boss.chargeT=akaPhase>=2?60:120;boss.charging=true;boss.chargeDir=P.x<boss.x?-1:1;boss.chargeDur=akaPhase>=2?45:30;addMsg('CHARGE!!','#FF4400');screenShake=14;}
  boss.rockT--;if(!boss.rockT){boss.rockT=akaPhase>=2?30:50;throwRock(boss);throwRock({...boss,vx:-boss.vx});if(akaPhase>=2)throwRock({...boss,x:boss.x+boss.w/2});}
  // Contact damage (phase 3: immune)

}
function updateBoss(){

    for(let i=wolfPack.length-1;i>=0;i--){

      w.vy=Math.min(w.vy+.58,15);resolve(w,false);

      }

    boss.wolfSpawnT--;

  }

  if(boss.frozen>0){boss.frozen--;return;}
  for(let i=boss.shockwaves.length-1;i>=0;i--){
    const sw=boss.shockwaves[i];sw.x+=sw.vx;sw.life--;sw.r+=1.5;

  if(boss.charging){

function makeSig(score,world){

function updateGimmick(){
  const g=inArena?(ARENA_DEFS[Math.min(world-1,9)].gimmick||null):th().gimmick;
  if(g==='wind'||(g==='all')){
    windTimer--;
    if(windTimer<=0){windTimer=g==='all'?80:Math.floor(Math.random()*180)+100;windForce=(Math.random()-.5)*(g==='all'?3.8:2.6);addMsg(windForce>0?'→ WIND GUST!':'← WIND GUST!','#FF8040');}
    if(!P.ground)P.x+=windForce*.35;P.vx=Math.max(-6,Math.min(6,P.vx));
  }
  if(g==='flood'||g==='lava'||g==='all'){
    const lavaMode=(g==='lava');
    const nearDoor=!inArena&&P.x>(LCOLS-36)*TILE; // B279: check before decrement
    if(!nearDoor)floodY-=(lavaMode?0.04:0.07)*(1+(world-6)*.08);
    // Cap flood so it never reaches the walkable floor — floor kills are frustrating
    // Flood still creates urgency: falling into it = instant death, ground is safe
    if(!lavaMode&&floodY<H-30)floodY=H-30;
    if(lavaMode&&floodY<H-20)floodY=H-20;
    // Near the boss tower (last 8 tiles), suppress flood — player must be able to enter
    if(!nearDoor&&P.y+gH()>floodY&&!P.dead){P.inv=1;killP();}
  }
  if(g==='crumble'||g==='all'){
    for(const key of Object.keys(crumbleTiles)){
      crumbleTiles[key]--;
      if(crumbleTiles[key]<=0){
        const[r2,c2]=key.split(',').map(Number);
        if(sg(r2,c2)!=='.'&&!bumped.has(key)){bumped.add(key);if(inArena)arenaMap[r2][c2]='.';else map[r2][c2]='.';burst(c2*TILE+16,r2*TILE+16,8,'#9A7848',4);delete crumbleTiles[key];}
      }
    }
  }
  if(g==='dark'||g==='ghostworld'){darkRadius=255+Math.sin(frame*.018)*18;}
}

// ── UPDATE ────────────────────────────────────────────
function update(){
  // Transition fade — runs in ALL states
  if(transitionDir!==0){
    transitionAlpha+=transitionDir*0.08;
    if(transitionDir>0&&transitionAlpha>=1){transitionAlpha=1;transitionDir=0;if(transitionCb){const cb=transitionCb;transitionCb=null;cb();}}
    if(transitionDir<0&&transitionAlpha<=0){transitionAlpha=0;transitionDir=0;}
  }
  // M — mute/unmute
  if(just['KeyM']){AU.toggleMute();clrJ();}
  // P / Escape — pause (not during leaderboard name entry)
  if((just['KeyP']||just['Escape'])&&state==='playing'){togglePause();clrJ();}
  // L while paused — exit to lobby
  if(paused&&just['KeyL']){
    paused=false;clearInterval(timerID);AU.bgmStop();
    coinBank+=coins;coins=0;
    try{localStorage.setItem('ginga_coin_bank',coinBank);}catch(e){}
    state='lobby';shopTab=0;shopCursor=0;skinShopCursor=0;clrJ();return;
  }
  if(paused){clrJ();return;}
  // NAME ENTRY (first screen)
  if(state==='nameentry'){
    frame++;
    if(just['Enter']){
      if(lbNameInput.trim().length>0){
        playerName=lbNameInput.trim().slice(0,12);
        try{localStorage.setItem('ginga_name',playerName);}catch(e){}
        state=firstLaunch?'howtoplay':'title';
      }
    }
    if(just['Backspace'])lbNameInput=lbNameInput.slice(0,-1);
    for(const k of Object.keys(just)){
      if(k.startsWith('Key')&&lbNameInput.length<12){const ch=k.replace('Key','');lbNameInput+=lbNameInput.length===0?ch:ch.toLowerCase();}if(k.startsWith('Digit')&&lbNameInput.length<12)lbNameInput+=k.replace('Digit','');if(k==='Minus'&&lbNameInput.length<12)lbNameInput+='-'; // B320
      if(k==='Space'&&lbNameInput.length<12)lbNameInput+=' ';
    }
    clrJ();return;
  }
  // LEADERBOARD
  if(state==='leaderboard'){
    frame++;
    if(lbEntering){
      if(just['Enter']&&lbNameInput.length>0)submitScore(lbNameInput);
      if(just['Escape']){submitScore(lbNameInput||playerName||'Unknown');}
      if(just['Backspace'])lbNameInput=lbNameInput.slice(0,-1);
      for(const k of Object.keys(just)){

  if(state==='lobby'){

    } else {
      const tk=UKEYS.filter(k=>UPG[k].tier===(shopTab===0?'perm':'buff')),n=tk.length;
      if(just['ArrowUp']||just['KeyW'])shopCursor=(shopCursor-1+n)%n;
      if(just['ArrowDown']||just['KeyS'])shopCursor=(shopCursor+1)%n;
      if(just['Space']||just['KeyZ']||just['KeyX']){

  if(P.big){

  if(P.spinTimer>0){P.spinTimer--;P.spinAngle+=.22;if(!P.spinTimer){P.spinActive=false;addMsg('Battouga ended'+(P.spinStored>0?' ×'+P.spinStored+' ready':''),'#4488BB');}}
  if(P.howlTimer>0){P.howlTimer--;if(!P.howlTimer)P.howlActive=false;}

  if(P.spinActive){const sx=P.x+gW()/2;for(const e of enemies)if(e.alive&&!e.squished&&Math.hypot(e.x+e.w/2-sx,e.y+e.h/2-(P.y+gH()/2))<(P.big?85:65))defeat(e,'SPIN');for(const w of wolfPack)if(w.alive&&!w.squished&&Math.hypot(w.x+w.w/2-sx,w.y+w.h/2-(P.y+gH()/2))<(P.big?85:65))defeatWolf(w,'spin');}
  if(skinNotif){skinNotif.timer--;if(skinNotif.timer<=0)skinNotif=null;}
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)comboCount=0;}

  // Score milestones → bonus life
  const ms=Math.floor(score/25000)*25000;
  if(ms>lastMilestone&&ms>0){lastMilestone=ms;addMsg('+1 LIFE at '+ms.toLocaleString()+'!','#FF88FF');lives++;burst(P.x+gW()/2,P.y+gH()/2,30,'#FF88FF',8);}

  const bspd=3.6;
  const iceSlip=th().gimmick==='ice'||(inArena&&ARENA_DEFS[Math.min(world-1,9)].gimmick==='icy');

  // Run momentum: starts at 1x (normal), ramps up to 1.5x over ~6 tiles of continuous running

  }else{
    P.momentum=Math.max(1,(P.momentum||1)-momDecay);

  }
  // Spin loop sound
  if(P.spinActive&&frame%12===0)AU.play('spinloop');
  vendNearby=false;
  P.vy=Math.min(P.vy+.58,15);resolve(P,true);
  // B key: open vending machine — checked after resolve so vendNearby is freshly set
  if(just['KeyB']){if(vendNearby&&!vendActive){vendActive=true;vendCursor=0;}}
  if(P.groundPound&&P.ground){

    AU.play('poundland');
    const poundCol=P.giga?'#FF8800':'#CC6600';
    burst(P.x+gW()/2,P.y+gH(),P.giga?35:18,poundCol,P.giga?10:6);
    addMsg(P.giga?'💥 GIGA POUND!':'GROUND POUND!',poundCol);
    const bc2=Math.floor(P.x/TILE),bc3=Math.floor((P.x+gW()-1)/TILE);
    for(let c=bc2;c<=bc3;c++){const r=Math.floor((P.y+gH())/TILE);const t=sg(r,c);if(t==='Q')onBump(r,c,t);else smashTile(r,c);}
    const splashR=P.giga?90:28; // Giga = wide splash, normal = tight underfoot only
    for(const e of enemies){

      const wUnder=Math.abs(wx-P.x-gW()/2)<gW()/2+6&&Math.abs(wy-(P.y+gH()))<20;
      const wSplash=P.giga&&Math.hypot(wx-P.x-gW()/2,wy-(P.y+gH()))<splashR;
      if(wUnder||wSplash)defeatWolf(w,'stomp');
    }

    if(bossActive&&boss&&boss.alive){
      const bx=boss.x+boss.w/2,by=boss.y+boss.h/2;
      const bUnder=Math.abs(bx-P.x-gW()/2)<boss.w/2+8&&Math.abs(by-(P.y+gH()))<30;
      const bSplash=P.giga&&Math.hypot(bx-P.x-gW()/2,by-(P.y+gH()))<splashR;

        const d=(UPG.rikiFang&&UPG.rikiFang.owned)?2:1;

    if(e.frozen>0){
      e.frozen--;

        else if(P.vy>0&&P.y+gH()<=e.y+e.h*(P.big?.7:.5)+12){defeat(e,'STOMP');P.vy=P.big?-10:-8;P.jumps=Math.max(P.jumps,1);}

    if(e.type==='bat'){e.y+=Math.sin(frame*.06+e.x*.008)*1.2;e.x+=e.vx;const batMaxX=inArena?(ARENA_COLS-2)*TILE:(LCOLS-1)*TILE;if(e.x<(inArena?2*TILE:0)||e.x>batMaxX)e.vx*=-1;}
    else{e.vy=Math.min(e.vy+.58,15);resolve(e,false);const ec2=Math.floor((e.x+e.w/2)/TILE);if(!solid(sg(Math.floor((e.y+e.h+4)/TILE),ec2)))e.vx*=-1;}

      else if(P.spinActive){defeat(e,'SPIN');P.vy=-8;P.jumps=Math.max(P.jumps,1);}
      else if(P.vy>0&&P.y+gH()<=e.y+e.h*(P.big?.7:.5)+12){defeat(e,'STOMP');P.vy=P.big?-10:-8;P.jumps=Math.max(P.jumps,1);}

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life--;if(!p.life)particles.splice(i,1);}

  for(let i=bumpAnims.length-1;i>=0;i--){bumpAnims[i].t--;if(!bumpAnims[i].t)bumpAnims.splice(i,1);}

}

function drawTile(t,px,py,bump){

  else if(t==='B'){ctx.fillStyle='#5A9820';ctx.fillRect(px,py+by,TILE,8);ctx.fillStyle='#4A7818';ctx.fillRect(px,py+8+by,TILE,TILE-8);ctx.fillStyle='#3A6010';ctx.fillRect(px+10,py+8+by,4,TILE-8);ctx.fillStyle='#7AB030';ctx.fillRect(px+9,py+10+by,6,4);ctx.fillRect(px+9,py+20+by,6,4);}
  else if(t==='S'){ctx.fillStyle='#E8E4DC';ctx.fillRect(px,py+by,TILE,TILE);ctx.fillStyle='rgba(255,255,255,.65)';ctx.fillRect(px+2,py+2+by,TILE-4,8);ctx.fillStyle='#C8C4C0';ctx.fillRect(px,py+28+by,TILE,4);}
  else if(t==='Q'){
    // World-specific loot containers
    const bumped2=bumpAnims.find(b=>b.c===Math.round((px+camX)/TILE)&&b.r===Math.round(py/TILE));
    const bob=bumped2?Math.sin(bumped2.t*.4)*4:0;

    const cx=px+TILE/2, cy=py2+TILE/2;
    const w2=world||1;

    if(w2<=2){

      ctx.fillRect(px+3,py2+2,TILE-6,3);

      const glowC=icy?'rgba(100,200,255,':'rgba(255,200,80,';
      const gl=ctx.createRadialGradient(cx,py2+8,0,cx,py2+8,10);
      gl.addColorStop(0,glowC+'0.9)');gl.addColorStop(1,glowC+'0)');
      ctx.fillStyle=gl;ctx.fillRect(px+6,py2+4,TILE-12,8);

      if(icy){ctx.fillStyle='rgba(220,235,255,0.7)';ctx.fillRect(px+3,py2+1,TILE-6,3);}

    } else if(w2<=4){
      // W3-4: Tanuki statue — Dark Forest / Volcanic Ridge

      const ac=volcanic?'#FF6030':'#80C040'; // accent
      // Big belly

      ctx.beginPath();ctx.ellipse(cx,py2+19,10,11,0,0,Math.PI*2);ctx.fill();
      // Head

    } else if(w2<=6){

  else if(t==='V'){ctx.fillStyle=checkpointReached?'#50FF80':'#DDDD00';ctx.fillRect(px+13,py,6,TILE);ctx.beginPath();ctx.moveTo(px+19,py+2);ctx.lineTo(px+30,py+10);ctx.lineTo(px+19,py+18);ctx.fill();ctx.fillStyle='#606060';ctx.fillRect(px+13,py+18,6,TILE-18);if(!checkpointReached&&Math.floor(frame/18)%2){ctx.globalAlpha=.35;ctx.fillStyle='#FFFF00';ctx.fillRect(px-6,py-6,TILE+12,TILE+12);ctx.globalAlpha=1;}}

      // Lava seam glows

// ── DRAW ARENA ────────────────────────────────────────────────────────────────
function drawArena(){
  const def=ARENA_DEFS[Math.min(world-1,9)];
  const T=th(); // world theme — same sky, ground, atmosphere as the outer world

  // ── BACKGROUND: identical to the outer world ──────────────────────────────
  // Draw the real world sky + atmosphere + clouds/particles
  drawBg();

  // Stone tower walls (left + right) — drawn over bg to frame the arena
  const wallCol=T.groundF;
  const wallAc=T.accent;
  // Left wall
  ctx.fillStyle=wallCol;ctx.fillRect(0,0,2*TILE,H);
  ctx.strokeStyle=wallAc;ctx.lineWidth=2;ctx.strokeRect(0,0,2*TILE,H);
  // Right wall
  ctx.fillStyle=wallCol;ctx.fillRect((ARENA_COLS-2)*TILE,0,2*TILE,H);
  ctx.strokeStyle=wallAc;ctx.lineWidth=2;ctx.strokeRect((ARENA_COLS-2)*TILE,0,2*TILE,H);
  // Ceiling
  ctx.fillStyle=wallCol;ctx.fillRect(0,0,ARENA_COLS*TILE,TILE);
  ctx.strokeStyle=wallAc;ctx.lineWidth=1;ctx.strokeRect(0,0,ARENA_COLS*TILE,TILE);
  // Wall decoration — torches on side walls
  for(let row=3;row<13;row+=3){
    const flame=.6+Math.sin(frame*.14+row)*.35;
    ctx.globalAlpha=flame;
    ctx.fillStyle=wallAc;
    ctx.beginPath();ctx.arc(2*TILE-6,row*TILE+16,5,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc((ARENA_COLS-2)*TILE+6,row*TILE+16,5,0,6.28);ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── ARENA TILES ───────────────────────────────────────────────────────────
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<ARENA_COLS;c++){
      const t=arenasg(r,c);
      if(t==='.'||t==='G'&&(c<2||c>=ARENA_COLS-2||r===0))continue; // walls drawn above
      const px=c*TILE, py=r*TILE;
      // Ghost platforms pulse in/out
      if(def.gimmick==='ghostplats'&&t==='R'){
        ctx.globalAlpha=Math.max(0.02,.4+Math.sin(frame*.04+c*.8)*.38);
      } else {
        ctx.globalAlpha=1;
      }
      drawTile(t,px,py,0);
      ctx.globalAlpha=1;
    }
  }

  // Lava rising from below (world 9 arena)
  if(def.gimmick==='lava'&&floodY<H){
    const lv=ctx.createLinearGradient(0,floodY,0,H);
    lv.addColorStop(0,'rgba(255,100,0,.0)');lv.addColorStop(.2,'rgba(255,60,0,.8)');lv.addColorStop(1,'rgba(200,20,0,1)');
    ctx.fillStyle=lv;ctx.fillRect(0,floodY,ARENA_COLS*TILE,H-floodY);
    ctx.fillStyle='rgba(255,200,0,.6)';
    for(let i=0;i<10;i++)ctx.fillRect((i*83+(frame*3)%83),floodY-4,40,5);
  }

  // Dark world overlay — pitch black except near player/boss
  const arenaDark=(def.gimmick==='dark'||def.gimmick==='ghostworld');
  const darkMode=T.gimmick==='dark'||T.gimmick==='ghostworld'||arenaDark;
  if(darkMode){
    ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,ARENA_COLS*TILE,H);
    const pl2=ctx.createRadialGradient(P.x+gW()/2,P.y+gH()/2,4,P.x+gW()/2,P.y+gH()/2,120);
    pl2.addColorStop(0,'rgba(255,220,140,.22)');pl2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pl2;ctx.fillRect(0,0,ARENA_COLS*TILE,H);
    if(bossActive&&boss.alive){
      const b2=ctx.createRadialGradient(boss.x+boss.w/2,boss.y+boss.h/2,8,boss.x+boss.w/2,boss.y+boss.h/2,170);
      b2.addColorStop(0,'rgba(255,80,0,.28)');b2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=b2;ctx.fillRect(0,0,ARENA_COLS*TILE,H);
    }
    // Redraw tiles in lit radius
    for(let r=0;r<ROWS;r++)for(let c=0;c<ARENA_COLS;c++){
      const t=arenasg(r,c);if(t==='.'||t==='G'&&(c<2||c>=ARENA_COLS-2||r===0))continue;
      const px=c*TILE,py=r*TILE;
      const dP=Math.hypot(px+TILE/2-(P.x+gW()/2),py+TILE/2-(P.y+gH()/2));
      const dB=bossActive&&boss.alive?Math.hypot(px+TILE/2-(boss.x+boss.w/2),py+TILE/2-(boss.y+boss.h/2)):9999;
      const d=Math.min(dP,dB);
      if(d<160){ctx.globalAlpha=Math.max(0,(1-d/160)*.9);drawTile(t,px,py,0);ctx.globalAlpha=1;}
    }
  }

  // ── EXIT PORTAL ───────────────────────────────────────────────────────────
  if(arenaExitOpen){
    const ex=(ARENA_COLS-5)*TILE, ey=11*TILE;  // moved left so portal is fully inside walls
    const pulse=.65+Math.sin(frame*.1)*.3;
    ctx.globalAlpha=pulse;
    const pg=ctx.createRadialGradient(ex+TILE,ey+TILE,4,ex+TILE,ey+TILE,40);
    pg.addColorStop(0,'rgba(0,255,150,1)');pg.addColorStop(1,'rgba(0,255,80,0)');
    ctx.fillStyle=pg;ctx.fillRect(ex-12,ey-12,TILE*2+24,TILE*2+24);
    ctx.globalAlpha=1;
    // Portal frame
    ctx.strokeStyle='rgba(0,255,120,.9)';ctx.lineWidth=2;
    ctx.strokeRect(ex,ey,TILE*2,TILE*2);
    ctx.fillStyle='rgba(0,255,120,.9)';ctx.font='bold 11px Georgia';ctx.textAlign='center';
    ctx.fillText('EXIT',ex+TILE,ey-7);ctx.textAlign='left';
    // Contact check is handled in update() — B270
  }

  // ── TOP BANNER: arena name only (boss HP drawn separately top-right)
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,24);
  ctx.fillStyle=T.accent;ctx.font='bold 12px Georgia';ctx.textAlign='center';
  ctx.fillText('⚔  '+def.desc.toUpperCase()+'  ⚔',W/2,15);
  ctx.textAlign='left';
}

// ── BG ────────────────────────────────────────────────
const MTS=[[0,210,220],[220,160,200],[460,185,210],[700,130,210],[960,165,180],[1250,105,220],[1600,140,190],[2000,80,215],[2500,120,200],[3200,90,230],[3900,130,195],[4800,75,210],[5900,105,190],[7200,85,220]];
const CLS=[[90,62],[300,48],[540,66],[810,52],[1100,60],[1500,46],[2000,66],[2600,50],[3400,58],[4300,45]];
function drawBg(){

  if(world===3){for(let i=0;i<14;i++){ctx.fillStyle='rgba(80,255,80,.4)';ctx.beginPath();ctx.arc(((i*137+frame*(.3+i*.04))%W),180+((i*79+Math.sin(frame*.03+i)*25)%(H-160)),1.5+Math.sin(frame*.08+i)*.5,0,6.28);ctx.fill();}}
  if(world===4||world===10){for(let i=0;i<22;i++){const ey=((i*73+frame*(1+i*.1))%H),ex=(i*113+Math.sin(frame*.02+i)*40)%W;ctx.fillStyle=`rgba(255,${70+i*7},0,${.4+Math.sin(frame*.1+i)*.25})`;ctx.beginPath();ctx.arc(ex,ey,1.5,0,6.28);ctx.fill();}const lg=ctx.createLinearGradient(0,H-85,0,H);lg.addColorStop(0,'rgba(0,0,0,0)');lg.addColorStop(1,'rgba(255,55,0,.5)');ctx.fillStyle=lg;ctx.fillRect(0,H-85,W,85);}
  if(world===6){if(Math.floor(frame/110)%7===0){ctx.fillStyle='rgba(80,160,255,.12)';ctx.fillRect(0,0,W,H);}for(let i=0;i<45;i++){const rx=(i*73+frame*3)%W,ry=(i*53+frame*4)%(H-80);ctx.strokeStyle='rgba(140,195,255,.28)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx+3,ry+14);ctx.stroke();}}
  if(world===7){for(let i=0;i<9;i++){const cx2=(i*112+50-camX*.07+W*2)%W;ctx.fillStyle=`rgba(255,180,40,${.18+Math.sin(frame*.14+i)*.09})`;ctx.beginPath();ctx.arc(cx2,H-105,7+Math.sin(frame*.2+i)*2.5,0,6.28);ctx.fill();}}
  if(world===8){for(let i=0;i<28;i++){const cx2=(i*93+frame*.5)%W,cy=(i*67+frame*.3)%H;ctx.fillStyle=`rgba(0,255,238,${.12+Math.sin(frame*.1+i)*.08})`;ctx.beginPath();ctx.arc(cx2,cy,2,0,6.28);ctx.fill();}}
  if(world===9){ctx.fillStyle='rgba(255,255,255,.55)';for(let i=0;i<7;i++){const cx2=(i*155-camX*.04+W)%W;for(const[dx,dy2,r]of[[0,0,20],[26,-9,24],[52,0,18],[28,9,27]]){ctx.beginPath();ctx.arc(cx2+dx,H-35+dy2,r,0,6.28);ctx.fill();}}}
  if(world===10){ctx.globalAlpha=.12;for(let i=0;i<7;i++){ctx.strokeStyle=`hsl(${280+i*22},80%,42%)`;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(i*130,H);ctx.bezierCurveTo(i*130+Math.sin(frame*.03+i)*45,H/2,i*130+Math.cos(frame*.02+i)*65,H/4,i*130+22,0);ctx.stroke();}ctx.globalAlpha=1;}
  // Mountains
  for(const[wx,py2,mw]of MTS){const mx=wx-camX*.18;if(mx>W+mw||mx+mw<-100)continue;
    ctx.fillStyle=`hsl(${205+world*18},${world>=4?7:16}%,${world>=4?5:14}%)`;
    ctx.beginPath();ctx.moveTo(mx,H);ctx.lineTo(mx,py2);ctx.lineTo(mx+mw/2,py2-78);ctx.lineTo(mx+mw,py2);ctx.lineTo(mx+mw,H);ctx.closePath();ctx.fill();
    if(world<=2){ctx.fillStyle='rgba(240,238,232,.5)';ctx.beginPath();ctx.moveTo(mx+mw/2,py2-78);ctx.lineTo(mx+mw/2-28,py2-24);ctx.lineTo(mx+mw/2+28,py2-24);ctx.closePath();ctx.fill();}
  }
  if(world<=3||world===6){for(const[wx,wy]of CLS){const cx2=wx-camX*.3;if(cx2<-140||cx2>W+140)continue;ctx.fillStyle=world===6?'rgba(150,175,200,.32)':'rgba(200,195,185,.42)';for(const[dx,dy2,r]of[[0,0,21],[26,-11,25],[52,0,19],[28,9,29]]){ctx.beginPath();ctx.arc(cx2+dx,wy+dy2,r,0,6.28);ctx.fill();}}}
  // Flood
  if(!inArena&&(th().gimmick==='flood'||th().gimmick==='all')&&floodY<H){
    const fg=ctx.createLinearGradient(0,floodY,0,H);fg.addColorStop(0,'rgba(0,80,200,.65)');fg.addColorStop(1,'rgba(0,40,160,.92)');ctx.fillStyle=fg;ctx.fillRect(0,floodY,W,H-floodY);
    ctx.fillStyle='rgba(100,200,255,.55)';for(let i=0;i<9;i++)ctx.fillRect((i*110+(frame*2)%110),floodY-3,52,4);
  }
  if(inArena) camX=_camX; // restore
}

function drawPines(){
  const sc2=Math.max(0,Math.floor(camX/TILE)-1),ec=Math.min(LCOLS-1,sc2+Math.ceil(W/TILE)+4);
  const done=new Set();
  for(let c=sc2;c<=ec;c++)for(let r=0;r<ROWS;r++){
    if(sg(r,c)==='T'&&!done.has(c)){done.add(c);let ph=0;for(let rr=r;rr<ROWS&&(sg(rr,c)==='T'||sg(rr,c)==='P');rr++)ph++;
      const px=c*TILE-camX,py=r*TILE,pw=TILE*2;
      const tc=world>=4?'#3A1A08':'#6B3A18',la=world>=4?'#281408':'#2A5018',lb=world>=4?'#180C04':'#1A4008';
      ctx.fillStyle=tc;ctx.fillRect(px+pw/2-5,py+20,10,ph*TILE-20);
      for(let i=0;i<Math.ceil(ph*1.3);i++){ctx.fillStyle=i%2?la:lb;const lw=pw*.45+i*7;ctx.beginPath();ctx.moveTo(px+pw/2,py+i*11);ctx.lineTo(px+pw/2-lw/2,py+i*11+18);ctx.lineTo(px+pw/2+lw/2,py+i*11+18);ctx.closePath();ctx.fill();}
      if(world<=2){ctx.fillStyle='rgba(240,236,232,.62)';ctx.beginPath();ctx.moveTo(px+pw/2,py);ctx.lineTo(px+pw/2-12,py+14);ctx.lineTo(px+pw/2+12,py+14);ctx.closePath();ctx.fill();}
    }
  }
}

// ── DRAW GIN ──────────────────────────────────────────
function drawGin(){
  if(P.inv>0&&Math.floor(P.inv/4)%2)return;
  // Coin skin overrides score skin if one is selected and owned
  const coinSk=getCoinSkin();
  const sk=coinSk||SKINS[currentSkin];
  const bw=gW(),bh=gH();
  const px=Math.round(P.x-camX),py=Math.round(P.y);
  ctx.save();

  // ── GIGA SOL aura ──
  if(P.giga){
    const gt=P.gigaTimer;
    const pulse=.3+Math.sin(frame*.18)*.18;
    ctx.globalAlpha=pulse;
    const gg=ctx.createRadialGradient(px+bw/2,py+bh/2,4,px+bw/2,py+bh/2,bw*1.8);
    gg.addColorStop(0,'#FF8800');gg.addColorStop(.5,'#FF4400');gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg;ctx.fillRect(px-bw,py-bh,bw*3,bh*3);
    // countdown pulse when expiring — soft circle not a box
    if(gt<180&&Math.floor(frame/8)%2===0){
      ctx.globalAlpha=.18;
      const eg=ctx.createRadialGradient(px+bw/2,py+bh/2,0,px+bw/2,py+bh/2,bw*1.4);
      eg.addColorStop(0,'rgba(255,80,0,.8)');eg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg;ctx.fillRect(px-bw,py-bh,bw*3,bh*3);
    }
    ctx.globalAlpha=1;
  }

  // ── SPIN ring ──
  if(P.spinActive){
    ctx.globalAlpha=.42;ctx.strokeStyle='#60A8FF';ctx.lineWidth=3;ctx.beginPath();ctx.arc(px+bw/2,py+bh/2,bw+Math.sin(P.spinAngle*3)*4,0,6.28);ctx.stroke();
    ctx.strokeStyle='#A0D0FF';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px+bw/2,py+bh/2,bw*1.7,0,6.28);ctx.stroke();
    ctx.globalAlpha=.18+Math.sin(P.spinAngle*4)*.08;
    const sg2=ctx.createRadialGradient(px+bw/2,py+bh/2,4,px+bw/2,py+bh/2,bw*1.2);sg2.addColorStop(0,'#80C8FF');sg2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg2;ctx.fillRect(px-bw,py-bh,bw*3,bh*3);ctx.globalAlpha=1;
    ctx.translate(px+bw/2,py+bh/2);ctx.rotate(P.spinAngle);ctx.translate(-(px+bw/2),-(py+bh/2));
  }

  // ── skin auras ──
  if(sk.ghost)ctx.globalAlpha=0.55;
  if(sk.gold){ctx.globalAlpha=.22+Math.sin(frame*.1)*.08;const gg2=ctx.createRadialGradient(px+bw/2,py+bh/2,2,px+bw/2,py+bh/2,bw*1.2);gg2.addColorStop(0,'#FFE840');gg2.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gg2;ctx.fillRect(px-bw,py-bh*.5,bw*3,bh*2);ctx.globalAlpha=sk.ghost?.55:1;}
  if(sk.rainbow){
    // Rainbow shimmer as radial gradient, not a solid box
    ctx.globalAlpha=.22+Math.sin(frame*.1)*.1;
    const rg=ctx.createRadialGradient(px+bw/2,py+bh/2,2,px+bw/2,py+bh/2,bw*1.3);
    rg.addColorStop(0,`hsl(${frame*5%360},100%,65%)`);rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg;ctx.fillRect(px-bw,py-bh,bw*3,bh*3);
    ctx.globalAlpha=sk.ghost?.55:1;
  }
  if(sk.dark){ctx.globalAlpha=.28;const dg=ctx.createRadialGradient(px+bw/2,py+bh/2,2,px+bw/2,py+bh/2,bw*1.5);dg.addColorStop(0,'#CC00FF');dg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=dg;ctx.fillRect(px-bw,py-bh,bw*3,bh*3);ctx.globalAlpha=sk.ghost?.55:1;}
  if(P.rallyActive){ctx.globalAlpha=.42+Math.sin(frame*.1)*.1;const ag=ctx.createRadialGradient(px+bw/2,py+bh/2,4,px+bw/2,py+bh/2,bw*.9);ag.addColorStop(0,'#F0C840');ag.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ag;ctx.fillRect(px-bw,py-bh,bw*3,bh*3);ctx.globalAlpha=1;}
  if(P.armor){ctx.globalAlpha=.18+Math.sin(frame*.1)*.08;const armG=ctx.createRadialGradient(px+bw/2,py+bh/2,2,px+bw/2,py+bh/2,bw);armG.addColorStop(0,'#8888CC');armG.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=armG;ctx.fillRect(px-bw,py-bh,bw*3,bh*3);ctx.globalAlpha=1;}

  // ── flip for facing ──
  if(!P.spinActive&&P.facing===-1){ctx.translate(px+bw/2,0);ctx.scale(-1,1);ctx.translate(-(px+bw/2),0);}

  if(P.dead){
    // Dead: just flat shape
    ctx.fillStyle=sk.body;ctx.fillRect(px,py+bh-10,bw,10);ctx.restore();return;
  }

  // Skin color with active states
  const bc=P.giga?`hsl(${30+Math.sin(frame*.15)*20},100%,55%)`:
            sk.rainbow?`hsl(${frame*4%360},90%,72%)`:
            P.spinActive?'#B0D8FF':P.howlActive?'#E0A040':sk.body;
  const markCol=P.giga?'#CC4400':(coinSk?.markCol||sk.markCol||(sk.body==='#F0F0F0'?'#D8D0C0':'#8898A8')); // saddle/back marking
  const isRunning=P.ground&&Math.abs(P.vx)>.5;
  const legSwing=isRunning?Math.sin(frame*(P.spinActive?.8:.28))*6:0;
  const bodyBob=isRunning?Math.abs(Math.sin(frame*.28))*2:0;
  const by=py+bodyBob; // body y offset for run bob

  // ── CURLED TAIL (Akita-style, curves up over back) ──
  ctx.strokeStyle=bc;ctx.lineWidth=P.big||P.giga?6:4;ctx.lineCap='round';
  ctx.beginPath();
  // tail base at rear-top of body, curves up and forward
  ctx.moveTo(px+3,by+bh*.35);
  ctx.bezierCurveTo(px-10,by+bh*.1, px+4,by-bh*.18, px+bw*.35,by-bh*.05);
  ctx.stroke();
  // darker tip
  ctx.strokeStyle=markCol;ctx.lineWidth=P.big||P.giga?3:2;
  ctx.beginPath();ctx.moveTo(px+4,by-bh*.1);ctx.lineTo(px+bw*.35,by-bh*.05);ctx.stroke();

  // ── BODY ──
  const bodyW=bw-4,bodyH=bh*.55;
  ctx.fillStyle=bc;
  ctx.beginPath();ctx.roundRect(px+2,by+bh*.28,bodyW,bodyH,4);ctx.fill();
  // Saddle marking (darker patch on back/top of body — Gin's distinctive look)
  ctx.fillStyle=markCol;
  ctx.beginPath();ctx.roundRect(px+2,by+bh*.28,bodyW,bodyH*.35,4);ctx.fill();
  // Belly / underside (lighter)
  ctx.fillStyle=sk.belly;
  ctx.beginPath();ctx.roundRect(px+bw*.2,by+bh*.5,bw*.6,bodyH*.45,3);ctx.fill();

  // ── COIN SKIN PATTERN OVERLAY ──
  if(coinSk&&coinSk.pattern&&coinSk.pattern!=='plain'){
    ctx.save();
    ctx.beginPath();ctx.roundRect(px+2,by+bh*.28,bodyW,bodyH,4);ctx.clip();
    ctx.globalAlpha=0.55;
    const p=coinSk.pattern;
    if(p==='stripe'){
      ctx.fillStyle='rgba(0,0,0,.35)';
      for(let i=0;i<6;i++){ctx.fillRect(px+2+i*(bodyW/6),by+bh*.28,bodyW/12,bodyH);}
    } else if(p==='spot'){
      ctx.fillStyle='rgba(0,0,0,.4)';
      [[.2,.35],[.55,.42],[.35,.6],[.7,.55],[.15,.6],[.65,.33]].forEach(([rx,ry])=>{
        ctx.beginPath();ctx.ellipse(px+bw*rx,by+bh*ry,4,5,0.3,0,6.28);ctx.fill();
      });
    } else if(p==='flame'){
      ctx.fillStyle='rgba(255,140,0,.5)';
      for(let i=0;i<5;i++){
        ctx.beginPath();ctx.moveTo(px+bw*(.1+i*.18),by+bh*.83);
        ctx.bezierCurveTo(px+bw*(.05+i*.18),by+bh*.55,px+bw*(.15+i*.18),by+bh*.4,px+bw*(.12+i*.18),by+bh*.28);
        ctx.bezierCurveTo(px+bw*(.18+i*.18),by+bh*.45,px+bw*(.2+i*.18),by+bh*.6,px+bw*(.15+i*.18),by+bh*.83);
        ctx.closePath();ctx.fill();
      }
    } else if(p==='circuit'){
      ctx.strokeStyle='rgba(0,255,200,.6)';ctx.lineWidth=1;
      [[.1,.4,.4,.4],[.4,.4,.4,.7],[.6,.3,.9,.3],[.6,.3,.6,.7],[.2,.6,.2,.8]].forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath();ctx.moveTo(px+bw*x1,by+bh*y1);ctx.lineTo(px+bw*x2,by+bh*y2);ctx.stroke();
        ctx.beginPath();ctx.arc(px+bw*x2,by+bh*y2,2,0,6.28);ctx.fillStyle='rgba(0,255,200,.8)';ctx.fill();
      });
    } else if(p==='camo'){
      ['rgba(0,0,0,.3)','rgba(80,100,0,.3)','rgba(40,60,20,.3)'].forEach((col,ci)=>{
        ctx.fillStyle=col;
        for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(px+bw*(.15+i*.22+ci*.08),by+bh*(.35+ci*.1),8+ci*3,6+ci*2,i*.4,0,6.28);ctx.fill();}
      });
    } else if(p==='star'){
      ctx.fillStyle='rgba(255,255,200,.7)';
      [[.25,.45],[.6,.38],[.45,.65],[.75,.6],[.15,.62]].forEach(([rx,ry])=>{
        ctx.beginPath();
        for(let s=0;s<5;s++){
          const a=s*1.257-1.57;const a2=a+0.628;
          ctx.lineTo(px+bw*rx+Math.cos(a)*5,by+bh*ry+Math.sin(a)*5);
          ctx.lineTo(px+bw*rx+Math.cos(a2)*2.5,by+bh*ry+Math.sin(a2)*2.5);
        }ctx.closePath();ctx.fill();
      });
    } else if(p==='crack'){
      ctx.strokeStyle='rgba(255,80,0,.5)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(px+bw*.3,by+bh*.3);ctx.lineTo(px+bw*.5,by+bh*.55);ctx.lineTo(px+bw*.42,by+bh*.7);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px+bw*.5,by+bh*.55);ctx.lineTo(px+bw*.68,by+bh*.45);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px+bw*.2,by+bh*.5);ctx.lineTo(px+bw*.38,by+bh*.65);ctx.stroke();
    } else if(p==='scale'){
      ctx.fillStyle='rgba(0,0,0,.25)';
      for(let row=0;row<4;row++)for(let col=0;col<5;col++){
        ctx.beginPath();ctx.arc(px+bw*(.12+col*.18+(row%2)*.09),by+bh*(.32+row*.14),5,Math.PI,0);ctx.fill();
      }
    } else if(p==='tribal'){
      ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(px+bw*.15,by+bh*.32);ctx.lineTo(px+bw*.3,by+bh*.5);ctx.lineTo(px+bw*.15,by+bh*.68);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px+bw*.55,by+bh*.32);ctx.lineTo(px+bw*.7,by+bh*.5);ctx.lineTo(px+bw*.55,by+bh*.68);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px+bw*.3,by+bh*.5);ctx.lineTo(px+bw*.55,by+bh*.5);ctx.stroke();
    }
    ctx.restore();
  }
  // Coin skin aura
  if(coinSk?.aura){
    ctx.save();ctx.globalAlpha=.6+Math.sin(frame*.1)*.2;
    ctx.fillStyle=coinSk.aura;
    ctx.beginPath();ctx.ellipse(px+bw/2,by+bh*.55,bw*.7,bh*.6,0,0,6.28);ctx.fill();
    ctx.restore();
  }

  // ── LEGS (4 legs, animated) ──
  const legW=P.big||P.giga?7:5,legH=P.big||P.giga?13:10;
  ctx.fillStyle=bc;
  // Back legs
  ctx.fillRect(px+3,by+bh*.78+legSwing,legW,legH);
  ctx.fillRect(px+bw*.28,by+bh*.78-legSwing*.7,legW,legH);
  // Front legs
  ctx.fillRect(px+bw*.55,by+bh*.78-legSwing,legW,legH);
  ctx.fillRect(px+bw*.78,by+bh*.78+legSwing*.7,legW,legH);
  // Paws (dark tips)
  ctx.fillStyle='#705840';
  ctx.fillRect(px+3,by+bh*.78+legSwing+legH-3,legW,3);
  ctx.fillRect(px+bw*.28,by+bh*.78-legSwing*.7+legH-3,legW,3);
  ctx.fillRect(px+bw*.55,by+bh*.78-legSwing+legH-3,legW,3);
  ctx.fillRect(px+bw*.78,by+bh*.78+legSwing*.7+legH-3,legW,3);

  // ── HEAD ──
  const hx=px+bw*.32,hy=by,hw=bw*.72,hh=bh*.38;
  ctx.fillStyle=bc;
  ctx.beginPath();ctx.roundRect(hx,hy,hw,hh,5);ctx.fill();
  // Forehead marking
  ctx.fillStyle=markCol;
  ctx.beginPath();ctx.roundRect(hx,hy,hw,hh*.4,5);ctx.fill();

  // ── SNOUT (protruding muzzle — key dog feature) ──
  const sx2=hx+hw*.55,sy2=hy+hh*.45,sw2=hw*.52,sh2=hh*.42;
  ctx.fillStyle=sk.belly; // lighter muzzle
  ctx.beginPath();ctx.roundRect(sx2,sy2,sw2,sh2,4);ctx.fill();
  // Black nose at tip of snout
  ctx.fillStyle='#1A1008';
  ctx.beginPath();ctx.ellipse(sx2+sw2-4,sy2+sh2*.35,4,3,0,0,6.28);ctx.fill();
  // Nose highlight
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(sx2+sw2-5,sy2+sh2*.2,2,2);
  // Mouth line
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(sx2+sw2-4,sy2+sh2*.6);ctx.lineTo(sx2+sw2-4,sy2+sh2*.85);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx2+sw2-4,sy2+sh2*.85);ctx.lineTo(sx2+sw2-9,sy2+sh2*.95);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx2+sw2-4,sy2+sh2*.85);ctx.lineTo(sx2+sw2+1,sy2+sh2*.95);ctx.stroke();

  // ── EYE ──
  ctx.fillStyle='#1A1008';ctx.beginPath();ctx.ellipse(hx+hw*.38,hy+hh*.52,3.5,3,0,0,6.28);ctx.fill();
  ctx.fillStyle=sk.eye;ctx.beginPath();ctx.ellipse(hx+hw*.38,hy+hh*.52,2.5,2,0,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillRect(hx+hw*.36,hy+hh*.44,1.5,1.5);

  // ── EARS (upright pointed Akita ears) ──
  ctx.fillStyle=bc;
  // Left ear
  ctx.beginPath();ctx.moveTo(hx+hw*.1,hy+2);ctx.lineTo(hx+hw*.05,hy-hh*.45);ctx.lineTo(hx+hw*.32,hy+2);ctx.closePath();ctx.fill();
  // Right ear
  ctx.beginPath();ctx.moveTo(hx+hw*.42,hy+2);ctx.lineTo(hx+hw*.55,hy-hh*.45);ctx.lineTo(hx+hw*.65,hy+2);ctx.closePath();ctx.fill();
  // Inner ear
  ctx.fillStyle=markCol;ctx.globalAlpha=.5;
  ctx.beginPath();ctx.moveTo(hx+hw*.12,hy+2);ctx.lineTo(hx+hw*.1,hy-hh*.28);ctx.lineTo(hx+hw*.28,hy+2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(hx+hw*.44,hy+2);ctx.lineTo(hx+hw*.53,hy-hh*.28);ctx.lineTo(hx+hw*.62,hy+2);ctx.closePath();ctx.fill();
  ctx.globalAlpha=sk.ghost?.55:1;

  // ── WHISKERS ──
  ctx.strokeStyle='rgba(200,180,140,.7)';ctx.lineWidth=1;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(sx2+2,sy2+sh2*.3);ctx.lineTo(sx2-8,sy2+sh2*.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx2+2,sy2+sh2*.45);ctx.lineTo(sx2-9,sy2+sh2*.42);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx2+2,sy2+sh2*.55);ctx.lineTo(sx2-7,sy2+sh2*.58);ctx.stroke();

  // ── BITE flash ──
  if(P.biteActive){
    const lx=px+bw+4;
    ctx.lineCap='butt'; // B282: don't inherit 'round' from whiskers
    ctx.globalAlpha=P.biteTimer/18;ctx.strokeStyle='#F0C040';ctx.lineWidth=3;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(lx,py+10+i*9);ctx.lineTo(lx+14,py+17+i*9);ctx.stroke();}
    ctx.globalAlpha=1;
  }

  // ── Scars overlay ──
  if(sk.scars){ctx.strokeStyle='#CC0020';ctx.lineWidth=1.5;ctx.globalAlpha=.75;ctx.beginPath();ctx.moveTo(hx+3,hy+4);ctx.lineTo(hx+10,hy+16);ctx.stroke();ctx.beginPath();ctx.moveTo(px+bw*.6,by+bh*.35);ctx.lineTo(px+bw*.45,by+bh*.58);ctx.stroke();ctx.globalAlpha=1;}

  // Giga countdown timer above head
  if(P.giga&&P.gigaTimer<300){
    ctx.fillStyle=`rgba(255,${100+Math.floor(P.gigaTimer/3)},0,.85)`;
    ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText(Math.ceil(P.gigaTimer/60)+'s',px+bw/2,py-6);
  }

  ctx.restore();
}

// ── DRAW ALLIES ───────────────────────────────────────
function drawAllies(){
  for(const a of allies){
    if(!a.active)continue;
    const ax=Math.round(a.x-camX),ay=Math.round(a.y);
    if(ax<-a.sz-10||ax>W+10)continue;
    ctx.save();
    ctx.globalAlpha=.28;const g=ctx.createRadialGradient(ax+a.sz/2,ay+a.sz/2,2,ax+a.sz/2,ay+a.sz/2,a.sz);g.addColorStop(0,'#FFE840');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(ax-8,ay-8,a.sz+16,a.sz+16);ctx.globalAlpha=1;
    ctx.fillStyle=a.col;ctx.fillRect(ax,ay+a.sz*.3,a.sz,a.sz*.7);
    ctx.beginPath();ctx.arc(ax+a.sz*.75,ay+a.sz*.25,a.sz*.28,0,6.28);ctx.fill();
    ctx.beginPath();ctx.moveTo(ax+a.sz*.6,ay+a.sz*.1);ctx.lineTo(ax+a.sz*.55,ay-a.sz*.1);ctx.lineTo(ax+a.sz*.72,ay+a.sz*.08);ctx.fill();
    ctx.beginPath();ctx.moveTo(ax+a.sz*.85,ay+a.sz*.1);ctx.lineTo(ax+a.sz*.95,ay-a.sz*.08);ctx.lineTo(ax+a.sz*.92,ay+a.sz*.12);ctx.fill();
    ctx.fillStyle='#000';ctx.fillRect(ax+a.sz*.78,ay+a.sz*.18,a.sz*.08,a.sz*.08);
    const loff=Math.sin(frame*.35)*a.sz*.18;
    ctx.fillStyle=a.col;
    ctx.fillRect(ax+a.sz*.1,ay+a.sz-a.sz*.25+loff,a.sz*.18,a.sz*.25);ctx.fillRect(ax+a.sz*.35,ay+a.sz-a.sz*.25-loff,a.sz*.18,a.sz*.25);
    ctx.fillRect(ax+a.sz*.58,ay+a.sz-a.sz*.25+loff*.7,a.sz*.18,a.sz*.25);ctx.fillRect(ax+a.sz*.78,ay+a.sz-a.sz*.25-loff*.7,a.sz*.18,a.sz*.25);
    ctx.strokeStyle=a.col;ctx.lineWidth=Math.max(2,a.sz*.08);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ax+2,ay+a.sz*.4);ctx.quadraticCurveTo(ax-a.sz*.3,ay+a.sz*.2+Math.sin(frame*.3)*8,ax-a.sz*.1,ay+a.sz*.1);ctx.stroke();
    if(a.name==='Akame'){ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(ax,ay+a.sz*.3,a.sz,a.sz*.7);ctx.beginPath();ctx.arc(ax+a.sz*.75,ay+a.sz*.25,a.sz*.28,0,6.28);ctx.fill();ctx.fillStyle='#FF2200';ctx.fillRect(ax+a.sz*.3,ay+a.sz*.35,a.sz*.5,a.sz*.1);}
    if(a.name==='Riki'){ctx.fillStyle='rgba(255,200,100,.38)';ctx.fillRect(ax-2,ay-2,a.sz+4,a.sz+4);}
    if(a.nameTimer>0){ctx.globalAlpha=Math.min(1,a.nameTimer/30);ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(ax,ay-22,a.name.length*8+8,16);ctx.fillStyle=a.boss?'#FFD700':a.elite?'#A0E8FF':'#F0E8C0';ctx.font='bold 11px Georgia';ctx.textAlign='left';ctx.fillText(a.name,ax+4,ay-9);ctx.globalAlpha=1;}
    ctx.restore();
  }
}

// ── DRAW ENEMIES ──────────────────────────────────────
// World-themed enemy color palette
function enemyTheme(){
  const w=world||1;
  // [bodyCol, accentCol, eyeCol, furDetail]
  const themes=[
    null,
    ['#6B3010','#4A1A00','#FF2200','#8B4A20'],  // W1 mountain brown
    ['#8AAABB','#4A7A8A','#00CCFF','#C0D8E8'],  // W2 ice blue
    ['#181208','#0A0A04','#60FF40','#282010'],  // W3 dark forest
    ['#5A1008','#3A0800','#FF6000','#8B2010'],  // W4 volcanic
    ['#200830','#100018','#CC00FF','#381048'],  // W5 abyss purple
    ['#203040','#102030','#40A8FF','#305060'],  // W6 storm blue
    ['#C8C8D8','#A0A0C0','#FFFFFF','#E8E8F8'],  // W7 ghost white
    ['#001828','#001020','#00FFEE','#002838'],  // W8 crystal deep
    ['#303050','#181828','#FFFF00','#404870'],  // W9 thunder dark
    ['#180010','#0A0008','#FF00FF','#280018'],  // W10 summit void
  ];
  return themes[Math.min(w,10)]||themes[1];
}

function drawEnemies(){
  const [bc,ac,ec,fc]=enemyTheme();
  for(const e of [...enemies,...wolfPack]){
    if(!e.alive)continue;
    const ex=Math.round(e.x-camX),ey=Math.round(e.y);
    if(ex<-80||ex>W+80)continue;
    if(e.ghost&&!e.squished){const dist=Math.hypot(e.x+e.w/2-P.x-gW()/2,e.y+e.h/2-P.y-gH()/2);if(dist>185&&!P.spinActive&&!P.howlActive)continue;ctx.globalAlpha=Math.max(.12,Math.min(1,(185-dist)/100));}
    const fr2=e.frozen>0;
    const iceTint=fr2?'rgba(150,200,255,.35)':null;
    if(e.squished){ctx.globalAlpha=1;ctx.fillStyle=fr2?'#667788':bc;ctx.fillRect(ex,ey+e.h-10,e.w,10);ctx.fillStyle=ac;ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h-5,e.w/2-3,0,Math.PI,true);ctx.fill();continue;}
    if(fr2){ctx.save();ctx.globalAlpha=.45;ctx.fillStyle='rgba(150,200,255,.35)';ctx.fillRect(ex-4,ey-4,e.w+8,e.h+8);ctx.restore();}

    // Wolf type — world-themed wolf
    if(e.type==='wolf'){
      const wc=fr2?'#8898A8':(e.wd?.col||bc);
      const we=fr2?'#60A0C0':(e.wd?.eyecol||ec);
      // Body
      ctx.fillStyle=wc;
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h*.55,e.w*.45,e.h*.38,0,0,6.28);ctx.fill();
      // Head
      ctx.beginPath();ctx.arc(ex+e.w*.55,ey+e.h*.28,e.h*.22,0,6.28);ctx.fill();
      // Snout
      ctx.fillStyle=fr2?'#A0B0C0':fc;
      ctx.beginPath();ctx.ellipse(ex+e.w*.72,ey+e.h*.3,e.h*.1,e.h*.08,0,0,6.28);ctx.fill();
      // Ears
      ctx.fillStyle=wc;
      ctx.beginPath();ctx.moveTo(ex+e.w*.42,ey+e.h*.1);ctx.lineTo(ex+e.w*.36,ey-e.h*.05);ctx.lineTo(ex+e.w*.52,ey+e.h*.1);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(ex+e.w*.58,ey+e.h*.1);ctx.lineTo(ex+e.w*.68,ey-e.h*.05);ctx.lineTo(ex+e.w*.72,ey+e.h*.1);ctx.closePath();ctx.fill();
      // Eyes
      ctx.fillStyle=we;
      ctx.beginPath();ctx.arc(ex+e.w*.63,ey+e.h*.25,3,0,6.28);ctx.fill();
      // Tail
      ctx.strokeStyle=wc;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(ex+e.w*.15,ey+e.h*.4);ctx.quadraticCurveTo(ex-e.w*.1,ey+e.h*.1,ex+e.w*.05,ey-e.h*.05);ctx.stroke();
      // Legs animated
      const lf=Math.sin(frame*.2)*5;
      ctx.fillStyle=wc;
      ctx.fillRect(ex+e.w*.2,ey+e.h*.7+lf,6,e.h*.25);
      ctx.fillRect(ex+e.w*.4,ey+e.h*.7-lf,6,e.h*.25);
      ctx.fillRect(ex+e.w*.6,ey+e.h*.7+lf,6,e.h*.25);
      ctx.fillRect(ex+e.w*.75,ey+e.h*.7-lf,6,e.h*.25);

    } else if(e.type==='bat'){
      ctx.fillStyle=fr2?'#8888A8':ac;
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w/2,e.h/2,0,0,6.28);ctx.fill();
      ctx.fillStyle=fr2?'#AAAAC8':bc;const ws=Math.sin(frame*.25)*.4;
      ctx.beginPath();ctx.moveTo(ex+e.w/2,ey+e.h/3);ctx.bezierCurveTo(ex-10,ey-10+ws*20,ex-20,ey+5,ex-5,ey+e.h*.6);ctx.fill();
      ctx.beginPath();ctx.moveTo(ex+e.w/2,ey+e.h/3);ctx.bezierCurveTo(ex+e.w+10,ey-10-ws*20,ex+e.w+20,ey+5,ex+e.w+5,ey+e.h*.6);ctx.fill();
      ctx.fillStyle=ec;ctx.fillRect(ex+e.w/2-4,ey+6,4,4);ctx.fillRect(ex+e.w/2+2,ey+6,4,4);

    } else if(e.type==='shadow'){
      ctx.fillStyle=fr2?'#9898B8':ac;
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w/2,e.h/2,0,0,6.28);ctx.fill();
      ctx.fillStyle=fr2?'#AAAAC8':bc;ctx.beginPath();ctx.arc(ex+e.w/2+4,ey+5,9,0,6.28);ctx.fill();
      ctx.fillStyle=ec;ctx.fillRect(ex+e.w-12,ey+2,6,5);

      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2+2,e.w/2,e.h/2,0,0,6.28);ctx.fill();
      // Armor (world-tinted)
      ctx.fillStyle=fr2?'#888898':ac;ctx.fillRect(ex+4,ey+8,e.w-8,e.h*.4);
      ctx.fillStyle=fr2?'#707080':bc;ctx.fillRect(ex+2,ey+8,4,e.h*.4);ctx.fillRect(ex+e.w-6,ey+8,4,e.h*.4);
      ctx.fillStyle=fr2?'#7878A8':ac;ctx.beginPath();ctx.arc(ex+e.w/2,ey+8,14,0,6.28);ctx.fill();
      ctx.beginPath();ctx.arc(ex+e.w/2-12,ey-2,7,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(ex+e.w/2+12,ey-2,7,0,6.28);ctx.fill();
      ctx.fillStyle=ec;ctx.fillRect(ex+e.w/2-8,ey+3,5,5);ctx.fillRect(ex+e.w/2+3,ey+3,5,5);
      if(e.hp>1){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(ex+4,ey-9,e.hp*9-3,7);
      for(let i=0;i<e.hp;i++){ctx.fillStyle=i===0?'#FF4040':'#40FF40';ctx.fillRect(ex+6+i*9,ey-8,6,5);}}
