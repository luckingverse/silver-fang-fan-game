      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2+4,e.w/2,e.h/2,0,0,6.28);ctx.fill();
      ctx.fillStyle=fr2?'#A898C8':ac;
      ctx.fillRect(ex+8,ey+8,8,e.h-16);ctx.fillRect(ex+e.w-16,ey+8,8,e.h-16);
      ctx.beginPath();ctx.arc(ex+e.w/2,ey+14,18,0,6.28);ctx.fill();
      ctx.beginPath();ctx.arc(ex+e.w/2-16,ey+2,8,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(ex+e.w/2+16,ey+2,8,0,6.28);ctx.fill();
      ctx.fillStyle=ec;ctx.fillRect(ex+e.w/2-12,ey+8,8,8);ctx.fillRect(ex+e.w/2+4,ey+8,8,8);
      if(e.hp>1){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(ex+6,ey-9,e.hp*11-3,7);
      for(let i=0;i<e.hp;i++){ctx.fillStyle=i===0?'#FF4040':'#40FF40';ctx.fillRect(ex+8+i*11,ey-8,8,5);}}

    } else if(e.type==='bear'||e.type==='rogue'){
      ctx.fillStyle=fr2?'#8878A8':bc;
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2+2,e.w/2,e.h/2,0,0,6.28);ctx.fill();
      ctx.fillStyle=fr2?'#A898C8':ac;
      ctx.fillRect(ex+8,ey+8,5,e.h-16);ctx.fillRect(ex+e.w-13,ey+8,5,e.h-16);
      ctx.beginPath();ctx.arc(ex+e.w/2,ey+8,12,0,6.28);ctx.fill();
      ctx.beginPath();ctx.arc(ex+e.w/2-10,ey,5,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(ex+e.w/2+10,ey,5,0,6.28);ctx.fill();
      ctx.fillStyle=e.shooter?`hsl(${frame*4%360},100%,55%)`:(fr2?'#6060A0':ec);
      ctx.fillRect(ex+e.w/2-8,ey+4,5,5);ctx.fillRect(ex+e.w/2+3,ey+4,5,5);
      const fw=Math.sin(frame*.12)*3;
      ctx.fillStyle=fr2?'#A898C8':ac;
      ctx.fillRect(ex+3,ey+e.h-10+fw,11,10);ctx.fillRect(ex+e.w-14,ey+e.h-10-fw,11,10);
    } else {
      ctx.fillStyle=fr2?'#9898B8':bc;
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w/2,e.h/2,0,0,6.28);ctx.fill();
      ctx.fillStyle=fr2?'#AAAAC8':ac;ctx.beginPath();ctx.arc(ex+e.w/2+5,ey+6,9,0,6.28);ctx.fill();
      ctx.fillStyle=ac;ctx.fillRect(ex+e.w-10,ey+7,8,6);
      ctx.fillStyle=fr2?'#4040A0':ec;ctx.fillRect(ex+e.w-12,ey+3,5,4);
      const lw=Math.sin(frame*.18)*4;ctx.fillStyle=ac;ctx.fillRect(ex+3,ey+e.h-12+lw,8,12);ctx.fillRect(ex+e.w-11,ey+e.h-12-lw,8,12);
    }

    // World-specific enemy auras
    if(world===2&&!fr2){ctx.globalAlpha=.15;ctx.fillStyle='#A0D0FF';ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w*.6,e.h*.6,0,0,6.28);ctx.fill();ctx.globalAlpha=1;}
    if(world===3){ctx.globalAlpha=.12;ctx.fillStyle='#40FF40';ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w*.55,e.h*.55,0,0,6.28);ctx.fill();ctx.globalAlpha=1;}
    if(world===4){ctx.globalAlpha=.18+Math.sin(frame*.15)*.05;ctx.fillStyle='#FF4400';ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w*.6,e.h*.6,0,0,6.28);ctx.fill();ctx.globalAlpha=1;}
    if(world===7){ctx.globalAlpha=.25+Math.sin(frame*.08)*.1;ctx.fillStyle='#D0D0FF';ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w*.6,e.h*.6,0,0,6.28);ctx.fill();ctx.globalAlpha=1;}
    if(world===8){ctx.globalAlpha=.2;ctx.strokeStyle='#00FFEE';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,e.w*.55,e.h*.55,0,0,6.28);ctx.stroke();ctx.globalAlpha=1;}
    if(world===9&&frame%15===0&&Math.random()<.25)burst(ex+e.w/2,ey,2,'#FFFF80',3);

    // Enemy growl sound trigger
    if(e.ground&&Math.random()<.0008&&!AU.muted&&state==='playing'&&!paused)AU.play('growl');
    ctx.globalAlpha=1;
  }
}

// ── DRAW BOSS ─────────────────────────────────────────
function drawBoss(){
  if(!bossActive)return;

  // Draw wolf minions first
  if(bossType==='wolf'&&wolfPack.length>0){
    const [,,,fc]=enemyTheme();
    for(const w of wolfPack){
      if(!w.alive||w.squished)continue;
      const wx=Math.round(w.x-camX),wy=Math.round(w.y);
      if(wx<-60||wx>W+60)continue;
      const wc=w.wd?.minCol||fc;
      ctx.fillStyle=wc;
      ctx.beginPath();ctx.ellipse(wx+w.w/2,wy+w.h*.55,w.w*.45,w.h*.38,0,0,6.28);ctx.fill();
      ctx.beginPath();ctx.arc(wx+w.w*.6,wy+w.h*.28,w.h*.22,0,6.28);ctx.fill();
      ctx.fillStyle=w.wd?.eyecol||'#88CCFF';
      ctx.beginPath();ctx.arc(wx+w.w*.72,wy+w.h*.24,2.5,0,6.28);ctx.fill();
      // Ears
      ctx.fillStyle=wc;
      ctx.beginPath();ctx.moveTo(wx+w.w*.5,wy+w.h*.1);ctx.lineTo(wx+w.w*.4,wy-4);ctx.lineTo(wx+w.w*.58,wy+w.h*.1);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(wx+w.w*.62,wy+w.h*.1);ctx.lineTo(wx+w.w*.72,wy-4);ctx.lineTo(wx+w.w*.78,wy+w.h*.1);ctx.closePath();ctx.fill();
      // Legs
      const lf=Math.sin(frame*.25)*4;
      ctx.fillRect(wx+4,wy+w.h*.7+lf,5,w.h*.25);ctx.fillRect(wx+w.w*.4,wy+w.h*.7-lf,5,w.h*.25);
      ctx.fillRect(wx+w.w*.6,wy+w.h*.7+lf,5,w.h*.25);ctx.fillRect(wx+w.w*.78,wy+w.h*.7-lf,5,w.h*.25);
    }
  }

  if(!boss.alive&&bossType!=='akaguma')return;
  if(bossType==='akaguma'&&akaDeathSeq>0){
    // Falling Akaguma death sequence
    const bx=Math.round(boss.x-camX),by2=Math.round(boss.y);
    ctx.save();ctx.globalAlpha=Math.max(0,akaDeathSeq/240);
    ctx.translate(bx+boss.w/2,by2+boss.h/2);
    ctx.rotate((240-akaDeathSeq)*.04);
    ctx.translate(-boss.w/2,-boss.h/2);
    drawAkagumaBody(0,0,boss.w,boss.h,3);
    ctx.restore();
    return;
  }
  if(!boss.alive)return;

  const bx=Math.round(boss.x-camX),by2=Math.round(boss.y);
  const bw2=boss.w,bh2=boss.h;
  if(bx>W+250||bx<-250)return;

  if(bossType==='akaguma'){
    drawAkagumaBody(bx,by2,bw2,bh2,akaPhase);
    // Cliff kill hint
    if(akaCliffKill&&Math.floor(frame/30)%2===0){
      ctx.fillStyle='#FFFF00';ctx.font='bold 13px Georgia';ctx.textAlign='center';
      ctx.fillText('⚠ LURE TO CLIFF EDGE →',bx+bw2/2,by2-45);ctx.textAlign='left';
    }
    // Phase label
    const phaseNames=['','PHASE 1 — THE MOUNTAIN BEAR','PHASE 2 — BLOOD RAGE 血の怒り','PHASE 3 — DEATH HOWL 死の咆哮'];
    const phaseCol=['','#FF8800','#FF2200','#FF00FF'];
    const hw2=200;
    return; // HP drawn in top-right panel
  }

  // Named bear boss
  if(bossType==='bear'){
    const bd=boss.bd||BEAR_BOSSES[world];
    const bc3=boss.rage?(bd?.ragecol||'#8B1A00'):(bd?.col||'#6B3010');
    const ec3=bd?.eyecol||'#FF2200';
    if(boss.charging){ctx.save();ctx.globalAlpha=.3+Math.sin(frame*.3)*.15;ctx.fillStyle=ec3;ctx.fillRect(bx-8,by2-8,bw2+16,bh2+16);ctx.restore();}
    if(boss.rage){ctx.save();ctx.globalAlpha=.15+Math.sin(frame*.15)*.06;const rg=ctx.createRadialGradient(bx+bw2/2,by2+bh2/2,10,bx+bw2/2,by2+bh2/2,bw2);rg.addColorStop(0,ec3);rg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rg;ctx.fillRect(bx-20,by2-20,bw2+40,bh2+40);ctx.restore();}
    // Body
    ctx.fillStyle=bc3;ctx.beginPath();ctx.ellipse(bx+bw2/2,by2+bh2/2+10,bw2/2,bh2/2,0,0,6.28);ctx.fill();
    // World-specific markings
    if(world===3){// dark slashes
      ctx.strokeStyle='#60FF40';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx+20,by2+20);ctx.lineTo(bx+40,by2+40);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx+bw2-20,by2+15);ctx.lineTo(bx+bw2-35,by2+35);ctx.stroke();
    }
    if(world===5){// lava cracks
      ctx.strokeStyle='#FF6000';ctx.lineWidth=1.5;
      for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(bx+15+i*15,by2+30);ctx.lineTo(bx+20+i*15,by2+55);ctx.stroke();}
    }
    if(world===7){// ghost shimmer
      ctx.globalAlpha=.3+Math.sin(frame*.1)*.15;ctx.fillStyle='#E0E0FF';
      ctx.beginPath();ctx.ellipse(bx+bw2/2,by2+bh2/2,bw2*.55,bh2*.55,0,0,6.28);ctx.fill();ctx.globalAlpha=1;
    }
    if(world===9){// thunder sparks
      if(frame%6===0)burst(bx+bw2/2,by2+20,4,'#FFFF80',5);
    }
    // Head
    ctx.fillStyle=bc3;ctx.beginPath();ctx.arc(bx+bw2/2,by2+22,28,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(bx+bw2/2-22,by2,12,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(bx+bw2/2+22,by2,12,0,6.28);ctx.fill();
    // Eyes
    ctx.fillStyle=ec3;ctx.fillRect(bx+bw2/2-18,by2+12,10,10);ctx.fillRect(bx+bw2/2+8,by2+12,10,10);
    // Mouth
    ctx.fillStyle='#601010';ctx.fillRect(bx+bw2/2+6,by2+8,14,3);ctx.fillRect(bx+bw2/2+6,by2+18,14,3);
    // Teeth
    ctx.fillStyle='#E8E0C0';ctx.fillRect(bx+bw2/2-12,by2+30,32,14);ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx+bw2/2-12,by2+32,5,10);ctx.fillRect(bx+bw2/2+7,by2+32,5,10);
    // Legs
    const bs2=boss.ground?Math.sin(frame*.1)*5:0;ctx.fillStyle=bc3;ctx.fillRect(bx+5,by2+bh2-24+bs2,25,24);ctx.fillRect(bx+bw2-30,by2+bh2-24-bs2,25,24);
    // Health bar
    return;
  }

  // Wolf alpha boss
  if(bossType==='wolf'){
    const wd=boss.wd||WOLF_PACKS[world];
    const wc2=boss.rage?'#FF6600':(wd?.col||'#8AAABB');
    const we2=wd?.eyecol||'#00CCFF';
    if(boss.charging){ctx.save();ctx.globalAlpha=.3+Math.sin(frame*.3)*.15;ctx.fillStyle=we2;ctx.fillRect(bx-8,by2-8,bw2+16,bh2+16);ctx.restore();}
    if(boss.rage){ctx.save();ctx.globalAlpha=.15;const rg=ctx.createRadialGradient(bx+bw2/2,by2+bh2/2,10,bx+bw2/2,by2+bh2/2,bw2*.8);rg.addColorStop(0,we2);rg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rg;ctx.fillRect(bx-20,by2-20,bw2+40,bh2+40);ctx.restore();}
    // Alpha is bigger than minions — full wolf shape scaled up
    ctx.fillStyle=wc2;
    // Body
    ctx.beginPath();ctx.ellipse(bx+bw2*.5,by2+bh2*.55,bw2*.46,bh2*.38,0,0,6.28);ctx.fill();
    // Head
    ctx.beginPath();ctx.arc(bx+bw2*.58,by2+bh2*.28,bh2*.25,0,6.28);ctx.fill();
    // Snout
    ctx.fillStyle=wd?.minCol||wc2;ctx.beginPath();ctx.ellipse(bx+bw2*.78,by2+bh2*.3,bh2*.12,bh2*.09,.1,0,6.28);ctx.fill();
    // Ears — large
    ctx.fillStyle=wc2;
    ctx.beginPath();ctx.moveTo(bx+bw2*.44,by2+bh2*.1);ctx.lineTo(bx+bw2*.34,by2-bh2*.08);ctx.lineTo(bx+bw2*.56,by2+bh2*.1);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(bx+bw2*.62,by2+bh2*.08);ctx.lineTo(bx+bw2*.74,by2-bh2*.08);ctx.lineTo(bx+bw2*.8,by2+bh2*.1);ctx.closePath();ctx.fill();
    // Mane / ruff
    ctx.globalAlpha=.6;
    for(let i=0;i<8;i++){ctx.fillStyle=wc2;ctx.beginPath();ctx.ellipse(bx+bw2*.3+i*bw2*.06,by2+bh2*.35,6,10,(i-4)*.15,0,6.28);ctx.fill();}
    ctx.globalAlpha=1;
    // Eyes — glowing
    ctx.fillStyle=we2;ctx.shadowColor=we2;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(bx+bw2*.67,by2+bh2*.24,5,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.shadowColor='transparent'; // B308
    // Scar (alpha battle-worn)
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bx+bw2*.58,by2+bh2*.18);ctx.lineTo(bx+bw2*.68,by2+bh2*.3);ctx.stroke();
    // Tail — large swept
    ctx.strokeStyle=wc2;ctx.lineWidth=6;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(bx+bw2*.15,by2+bh2*.4);ctx.quadraticCurveTo(bx-bw2*.1,by2+bh2*.1,bx+bw2*.05,by2-bh2*.05);ctx.stroke();
    ctx.lineCap='butt';
    // World effects on alpha
    if(world===2){ctx.globalAlpha=.25;ctx.fillStyle='#C0E8FF';ctx.beginPath();ctx.ellipse(bx+bw2/2,by2+bh2/2,bw2*.6,bh2*.6,0,0,6.28);ctx.fill();ctx.globalAlpha=1;}
    if(world===4&&frame%8===0)burst(bx+bw2*.7,by2+bh2*.3,3,'#FF6000',4);
    if(world===6){ctx.globalAlpha=.15+Math.sin(frame*.12)*.1;ctx.fillStyle='#40A8FF';ctx.beginPath();ctx.ellipse(bx+bw2/2,by2+bh2/2,bw2*.65,bh2*.65,0,0,6.28);ctx.fill();ctx.globalAlpha=1;}
    if(world===8){ctx.globalAlpha=.3;ctx.strokeStyle='#00FFEE';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(bx+bw2/2,by2+bh2/2,bw2*.58,bh2*.58,0,0,6.28);ctx.stroke();ctx.globalAlpha=1;}
    // Legs
    const blf=boss.ground?Math.sin(frame*.12)*6:0;ctx.fillStyle=wc2;
    ctx.fillRect(bx+bw2*.1,by2+bh2*.72+blf,10,bh2*.25);ctx.fillRect(bx+bw2*.3,by2+bh2*.72-blf,10,bh2*.25);
    ctx.fillRect(bx+bw2*.55,by2+bh2*.72+blf,10,bh2*.25);ctx.fillRect(bx+bw2*.75,by2+bh2*.72-blf,10,bh2*.25);
    // Health bar drawn in top-right panel (drawBossHP)
  }
}

function drawAkagumaBody(bx,by2,bw2,bh2,phase){
  const pc=['','#6B3010','#8B1A00','#3A0000'][phase]||'#6B3010';
  const ec2=['','#880000','#FF2200','#FF00FF'][phase]||'#880000';
  // Phase 2+: rage aura
  if(phase>=2){
    ctx.save();ctx.globalAlpha=.15+Math.sin(frame*.12)*.08;
    const rg=ctx.createRadialGradient(bx+bw2/2,by2+bh2/2,20,bx+bw2/2,by2+bh2/2,bw2*.8);
    rg.addColorStop(0,phase===3?'rgba(255,0,200,.9)':'rgba(255,50,0,.9)');rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg;ctx.fillRect(bx-40,by2-40,bw2+80,bh2+80);ctx.restore();
  }
  // Massive body
  ctx.fillStyle=pc;ctx.beginPath();ctx.ellipse(bx+bw2/2,by2+bh2*.55,bw2*.52,bh2*.48,0,0,6.28);ctx.fill();
  // Famous red scar/wound pattern on Akaguma
  ctx.strokeStyle='rgba(200,0,0,.7)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(bx+bw2*.25,by2+bh2*.2);ctx.lineTo(bx+bw2*.45,by2+bh2*.45);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx+bw2*.6,by2+bh2*.15);ctx.lineTo(bx+bw2*.75,by2+bh2*.4);ctx.stroke();
  if(phase>=2){// blood drips in rage
    ctx.fillStyle='rgba(200,0,0,.6)';
    for(let i=0;i<5;i++)ctx.fillRect(bx+bw2*.2+i*bw2*.12,by2+bh2*.5,3,bh2*.08+i*3);
  }
  // Giant head
  ctx.fillStyle=pc;ctx.beginPath();ctx.arc(bx+bw2/2,by2+bh2*.22,bw2*.32,0,6.28);ctx.fill();
  // Ears — huge
  ctx.beginPath();ctx.arc(bx+bw2*.24,by2,bw2*.12,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(bx+bw2*.76,by2,bw2*.12,0,6.28);ctx.fill();
  // Eyes — iconic red
  ctx.fillStyle=ec2;ctx.shadowColor=ec2;ctx.shadowBlur=phase>=2?18:10;
  ctx.fillRect(bx+bw2*.3,by2+bh2*.14,bw2*.1,bh2*.08);
  ctx.fillRect(bx+bw2*.6,by2+bh2*.14,bw2*.1,bh2*.08);
  ctx.shadowBlur=0;
  // Brow ridge (menacing)
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.beginPath();ctx.moveTo(bx+bw2*.27,by2+bh2*.12);ctx.lineTo(bx+bw2*.42,by2+bh2*.1);ctx.lineTo(bx+bw2*.42,by2+bh2*.14);ctx.lineTo(bx+bw2*.27,by2+bh2*.16);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+bw2*.73,by2+bh2*.12);ctx.lineTo(bx+bw2*.58,by2+bh2*.1);ctx.lineTo(bx+bw2*.58,by2+bh2*.14);ctx.lineTo(bx+bw2*.73,by2+bh2*.16);ctx.closePath();ctx.fill();
  // Mouth / fangs
  ctx.fillStyle='#2A0000';ctx.fillRect(bx+bw2*.35,by2+bh2*.3,bw2*.3,bh2*.08);
  ctx.fillStyle='#F0E8D0';
  ctx.fillRect(bx+bw2*.38,by2+bh2*.3,bw2*.06,bh2*.1);
  ctx.fillRect(bx+bw2*.48,by2+bh2*.3,bw2*.04,bh2*.07);
  ctx.fillRect(bx+bw2*.57,by2+bh2*.3,bw2*.06,bh2*.1);
  // Phase 3: crackling energy
  if(phase===3&&frame%4===0){
    burst(bx+bw2*.3+Math.random()*bw2*.4,by2+Math.random()*bh2*.5,4,'#FF00FF',5);
  }
  // Legs — massive
  const blg=Math.sin(frame*.08)*6;ctx.fillStyle=pc;
  ctx.fillRect(bx+bw2*.08,by2+bh2*.78+blg,bw2*.18,bh2*.2);
  ctx.fillRect(bx+bw2*.35,by2+bh2*.8-blg,bw2*.16,bh2*.18);
  ctx.fillRect(bx+bw2*.52,by2+bh2*.78+blg,bw2*.16,bh2*.18);
  ctx.fillRect(bx+bw2*.74,by2+bh2*.8-blg,bw2*.18,bh2*.2);
  // Cliff edge indicator when in phase 3
  if(akaCliffKill){
    const cliffScreenX=Math.round(boss.cliffX-camX);
    if(cliffScreenX>0&&cliffScreenX<W){
      ctx.fillStyle='rgba(255,255,0,.3)';ctx.fillRect(cliffScreenX-4,0,8,H);
      ctx.fillStyle='rgba(255,255,0,.8)';ctx.font='bold 12px Georgia';ctx.textAlign='center';
      ctx.fillText('CLIFF EDGE',cliffScreenX,H-60);ctx.textAlign='left';
    }
  }
}
function drawShockwaves(){
  if(!bossActive||!boss.alive)return;
  for(const sw of boss.shockwaves){const sx=sw.x-camX,sgy=(sw.gy||13*TILE);ctx.save();ctx.globalAlpha=Math.min(1,sw.life/35)*.7;ctx.strokeStyle='#FF8800';ctx.lineWidth=4;ctx.beginPath();ctx.arc(sx,sgy,sw.r,Math.PI,0);ctx.stroke();ctx.strokeStyle='#FFD000';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sgy,sw.r*.6,Math.PI,0);ctx.stroke();ctx.restore();}
}
function drawFB(){
  for(const fb of fireballs){const fx=fb.x-camX,fy=fb.y;if(fx<-40||fx>W+40)continue;
    ctx.save();ctx.globalAlpha=.38;const g=ctx.createRadialGradient(fx,fy,1,fx,fy,fb.sz*2.5);g.addColorStop(0,fb.col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(fx-fb.sz*2.5,fy-fb.sz*2.5,fb.sz*5,fb.sz*5);ctx.globalAlpha=1;ctx.fillStyle=fb.col;ctx.beginPath();ctx.arc(fx,fy,fb.sz,0,6.28);ctx.fill();ctx.fillStyle='#FFEE88';ctx.beginPath();ctx.arc(fx,fy,fb.sz*.5,0,6.28);ctx.fill();ctx.globalAlpha=.45;ctx.fillStyle=fb.col;for(let i=1;i<=3;i++){ctx.beginPath();ctx.arc(fx-fb.vx*i*.8,fy-fb.vy*i*.8,fb.sz*(1-i*.25),0,6.28);ctx.fill();}ctx.globalAlpha=1;ctx.restore();}
}
function drawRocks(){

    ctx.save();ctx.translate(rx,ry);ctx.rotate(frame*.12);ctx.fillStyle='#A08870';ctx.beginPath();ctx.arc(0,0,rb.r,0,6.28);ctx.fill();ctx.fillStyle='#C0A890';ctx.beginPath();ctx.arc(-4,-4,rb.r*.5,0,6.28);ctx.fill();ctx.restore();}

function drawItems(){
  for(const it of items){const ix=it.x-camX,iy=it.y;if(ix<-TILE||ix>W+TILE)continue;
    ctx.save();
    if(it.type==='COIN'){const sw2=Math.max(2,Math.abs(Math.cos(frame*.15))*TILE);ctx.fillStyle='#F0C840';ctx.fillRect(ix+(TILE-sw2)/2,iy+4,sw2,TILE-8);ctx.fillStyle='#FFE870';ctx.fillRect(ix+(TILE-sw2)/2+2,iy+6,sw2*.35,TILE-14);}
    else{const col=PCOL[it.type]||'#FFF';ctx.globalAlpha=.3+Math.sin(frame*.12)*.15;const g=ctx.createRadialGradient(ix+16,iy+16,3,ix+16,iy+16,22);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(ix-4,iy-4,TILE+8,TILE+8);ctx.globalAlpha=1;ctx.fillStyle=col;ctx.fillRect(ix+2,iy+2,TILE-4,TILE-4);ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(ix+4,iy+4,TILE-8,TILE/2-4);ctx.font='16px serif';ctx.textAlign='center';ctx.fillText({GROW:'🐕',SPIN:'🌀',HOWL:'🐺',RALLY:'🏅',SPEED:'⚡',STAR:'⭐'}[it.type]||'?',ix+16,iy+TILE-4);ctx.textAlign='left';}
    ctx.restore();}
}

// ── HUD ───────────────────────────────────────────────
function drawBossHP(){
  if(!bossActive||!boss||!boss.alive)return;
  const bpct=Math.max(0,boss.hp/boss.maxHp);
  // Boss identity
  const isBear=bossType==='bear', isWolf=bossType==='wolf', isAka=bossType==='akaguma';
  const bossCol=isAka?'#FF2200':isWolf?'#88CCFF':'#FF8800';
  const barFill=boss.rage?(isWolf?'#FF6600':'#FF2200'):bossCol;
  const bossName=isAka?'赤熊 AKAGUMA':
    isWolf?(boss.wd?.name||'WOLF ALPHA'):
    (boss.bd?.name||'BEAR BOSS');
  const subInfo=isAka?('Phase '+akaPhase+'/3'+(boss.rage?' ⚡RAGE':'')):
    isWolf?((boss.rage?'⚡RAGE  ':'')+'Pack ×'+wolfPack.filter(w=>w.alive).length):
    (boss.bd?.title||'')+(boss.rage?' ⚡RAGE':'');

  // Panel geometry — top-right, below pause button (y=49)
  const pw=230, ph=54, px2=W-pw-8, py2=54;

  // Panel background with subtle border
  ctx.save();
  ctx.fillStyle='rgba(10,4,4,.82)';
  ctx.strokeStyle=boss.rage?'rgba(255,60,0,.7)':'rgba(180,100,20,.5)';
  ctx.lineWidth=1.5;
  // Rounded-ish rect via fillRect + stroke
  ctx.fillRect(px2,py2,pw,ph);
  ctx.strokeRect(px2+.75,py2+.75,pw-1.5,ph-1.5);

  // Boss name
  ctx.fillStyle=bossCol;
  ctx.font='bold 11px Georgia';
  ctx.textAlign='left';
  ctx.fillText(bossName,px2+8,py2+14);

  // HP numbers right-aligned
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.font='10px monospace';
  ctx.textAlign='right';
  ctx.fillText('❤ '+boss.hp+'/'+boss.maxHp,px2+pw-6,py2+14);

  // HP bar track
  const bx2=px2+6, bw2=pw-12, bhy=py2+20;
  ctx.fillStyle='rgba(60,10,10,.9)';
  ctx.fillRect(bx2,bhy,bw2,14);
  // HP fill — animate a "drain" pulse when hurt (hurtFlash decremented in updateBoss)
  const pulseAlpha=boss.hurtFlash>0?(0.7+Math.sin(boss.hurtFlash*.5)*.3):1;
  ctx.globalAlpha=pulseAlpha;
  ctx.fillStyle=barFill;
  ctx.fillRect(bx2,bhy,bw2*bpct,14);
  // Shine
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillRect(bx2,bhy,bw2*bpct,5);
  ctx.globalAlpha=1;
  // Bar border
  ctx.strokeStyle='rgba(255,255,255,.15)';
  ctx.lineWidth=1;

// Offscreen canvas for reliable dark masking (destination-out unreliable on main canvas)
const darkCanvas=document.createElement('canvas');
darkCanvas.width=W;darkCanvas.height=H;
const dctx=darkCanvas.getContext('2d');

function drawDark(){
  const g=inArena?(ARENA_DEFS[Math.min(world-1,9)].gimmick||null):th().gimmick;
  if(g!=='dark'&&g!=='ghostworld')return;

  // Gin's screen position
  const gx=Math.round(P.x-camX+gW()/2);
  const gy=Math.round(P.y+gH()/2);

  if(g==='dark'){
    // Draw on offscreen canvas: solid black, then punch hole around Gin
    dctx.clearRect(0,0,W,H);
    // Fill black
    dctx.fillStyle='rgba(0,0,0,1)';
    dctx.fillRect(0,0,W,H);
    // Punch transparent hole using destination-out on clean offscreen context
    dctx.globalCompositeOperation='destination-out';
    const litR=darkRadius;
    const dm=dctx.createRadialGradient(gx,gy,0,gx,gy,litR);
    dm.addColorStop(0,'rgba(0,0,0,1)');
    dm.addColorStop(0.45,'rgba(0,0,0,0.98)');
    dm.addColorStop(0.8,'rgba(0,0,0,0.5)');
    dm.addColorStop(1,'rgba(0,0,0,0)');
    dctx.fillStyle=dm;
    dctx.fillRect(0,0,W,H);
    dctx.globalCompositeOperation='source-over';
    // Warm lantern glow on top
    const glow=dctx.createRadialGradient(gx,gy,0,gx,gy,litR*0.5);
    glow.addColorStop(0,'rgba(255,190,60,0.18)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    dctx.fillStyle=glow;
    dctx.fillRect(0,0,W,H);
    // Fireflies
    for(let i=0;i<8;i++){
      const fx=((i*173+frame*(i*.07+.04))%W);
      const fy=100+((i*97+frame*(i*.05+.03))%(H-160));
      if(Math.hypot(fx-gx,fy-gy)>litR*0.9){
        dctx.globalAlpha=0.4+Math.sin(frame*.12+i*1.4)*0.25;
        dctx.fillStyle='#60FF60';
        dctx.beginPath();dctx.arc(fx,fy,1.5,0,6.28);dctx.fill();
      }
    }
    dctx.globalAlpha=1;
    // Stamp offscreen canvas onto main canvas
    ctx.drawImage(darkCanvas,0,0);
  }

  if(g==='ghostworld'){
    // World fully visible — just purple fog + wisps, no masking needed
    ctx.save();
    ctx.fillStyle='rgba(20,8,30,.52)';ctx.fillRect(0,0,W,H);
    const vig=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.85);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(30,0,50,.68)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
    for(let i=0;i<6;i++){
      const wx=((i*210+frame*(i*.04+.02)+200)%W);
      const wy=150+((i*130+frame*(i*.025+.015))%(H-240));
      ctx.globalAlpha=.1+Math.sin(frame*.08+i*1.1)*.07;
      const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,38+Math.sin(frame*.06+i)*8);
      wg.addColorStop(0,'rgba(200,180,255,.9)');wg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=wg;ctx.beginPath();ctx.arc(wx,wy,46,0,6.28);ctx.fill();
    }
    ctx.globalAlpha=.07+Math.sin(frame*.1)*.03;
    const pg=ctx.createRadialGradient(gx,gy,0,gx,gy,55);
    pg.addColorStop(0,'rgba(180,100,255,.8)');pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
    ctx.restore();
  }
}

// Draws a button and returns its hit rect {x,y,w,h}
// lobbyBtns stores all buttons drawn this frame for click detection
let lobbyBtns={};
function uiBtn(id,x,y,w,h,label,opts={}){
  const {col='#C8A040',textCol='#F0E080',font='bold 13px Georgia',sel=false,dim=false,accent=null}=opts;
  lobbyBtns[id]={x,y,w,h};
  const bg=sel?'rgba(200,160,40,.35)':dim?'rgba(255,255,255,.03)':'rgba(255,255,255,.07)';

  ctx.lineWidth=sel?2:1;ctx.strokeRect(x,y,w,h);
  ctx.fillStyle=dim?'#604030':textCol;ctx.font=font;ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h/2+5);
  return {x,y,w,h};
}
function hitBtn(id,gx,gy){const b=lobbyBtns[id];return b&&gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h;}
function anyHitBtn(gx,gy){return Object.keys(lobbyBtns).find(id=>hitBtn(id,gx,gy));}

  ctx.fillStyle=bc2;ctx.beginPath();ctx.roundRect(dx+2,dy+dh*.28,dw-4,dh*.55,4);ctx.fill();
  // Saddle
  const markCol2=coinSk?.markCol||sk.markCol||(sk.body==='#F0F0F0'?'#D8D0C0':'#8898A8');
  ctx.fillStyle=markCol2;ctx.beginPath();ctx.roundRect(dx+2,dy+dh*.28,dw-4,dh*.2,4);ctx.fill();
  // Belly
  ctx.fillStyle=sk.belly;ctx.beginPath();ctx.roundRect(dx+dw*.2,dy+dh*.48,dw*.6,dh*.25,3);ctx.fill();
  // Pattern strip
  if(coinSk?.pattern==='stripe'){ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(dx+dw*.35,dy+dh*.28,4,dh*.55);}
  if(coinSk?.pattern==='flame'){ctx.fillStyle='rgba(255,120,0,.45)';ctx.fillRect(dx+dw*.55,dy+dh*.28,6,dh*.4);}
  // Legs
  ctx.fillStyle=bc2;
  ctx.fillRect(dx+3,dy+dh*.8+runPhase,8,14);ctx.fillRect(dx+dw*.3,dy+dh*.8-runPhase*.7,8,14);
  ctx.fillRect(dx+dw*.55,dy+dh*.8-runPhase,8,14);ctx.fillRect(dx+dw*.78,dy+dh*.8+runPhase*.7,8,14);
  // Head
  const hx2=dx+dw*.32,hy2=dy,hw2=dw*.72,hh2=dh*.36;
  ctx.fillStyle=bc2;ctx.beginPath();ctx.roundRect(hx2,hy2,hw2,hh2,5);ctx.fill();
  ctx.fillStyle=markCol2;ctx.beginPath();ctx.roundRect(hx2,hy2,hw2,hh2*.4,5);ctx.fill();
  // Snout
  ctx.fillStyle=sk.belly;ctx.beginPath();ctx.roundRect(hx2+hw2*.5,hy2+hh2*.45,hw2*.5,hh2*.42,4);ctx.fill();
  ctx.fillStyle='#1A1008';ctx.beginPath();ctx.ellipse(hx2+hw2*.95,hy2+hh2*.58,4,3,0,0,6.28);ctx.fill();
  // Eye
  ctx.fillStyle='#1A1008';ctx.beginPath();ctx.ellipse(hx2+hw2*.38,hy2+hh2*.52,3.5,3,0,0,6.28);ctx.fill();
  ctx.fillStyle=sk.eye;ctx.beginPath();ctx.ellipse(hx2+hw2*.38,hy2+hh2*.52,2.5,2,0,0,6.28);ctx.fill();
  // Scars
  if(sk.scars){ctx.strokeStyle='#CC0020';ctx.lineWidth=1.5;ctx.globalAlpha=.8;ctx.beginPath();ctx.moveTo(hx2+6,hy2+8);ctx.lineTo(hx2+14,hy2+18);ctx.stroke();ctx.globalAlpha=1;}
  // Rainbow shimmer
  if(sk.rainbow){ctx.globalAlpha=.18;ctx.fillStyle=`hsl(${frame*4%360},100%,60%)`;ctx.fillRect(dx,dy,dw,dh);ctx.globalAlpha=1;}
  // Dark glow
  if(sk.dark){ctx.globalAlpha=.2;ctx.fillStyle='#CC00FF';ctx.fillRect(dx-4,dy-4,dw+8,dh+8);ctx.globalAlpha=1;}
  // Tail
  ctx.strokeStyle=bc2;ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(dx+3,dy+dh*.35);ctx.bezierCurveTo(dx-10,dy+dh*.1,dx+4,dy-dh*.15,dx+dw*.35,dy-dh*.04);ctx.stroke();

  // Active skin name
  const skinName=coinSk?coinSk.name:sk.name;
  ctx.fillStyle='#C8A060';ctx.font='10px Georgia';ctx.textAlign='center';
  ctx.fillText(skinName,dogPanX+dogPanW/2,dogPanY+dh+74);
  ctx.fillStyle='rgba(180,140,50,.5)';ctx.font='9px monospace';
  ctx.fillText(coinSk?'COIN SKIN':'SCORE SKIN',dogPanX+dogPanW/2,dogPanY+dh+86);

  // World info
  const inGame=score>0||world>1;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(dogPanX+6,dogPanY+dogPanH-90,dogPanW-12,80);
  ctx.strokeStyle='rgba(140,100,30,.3)';ctx.lineWidth=1;ctx.strokeRect(dogPanX+6,dogPanY+dogPanH-90,dogPanW-12,80);
  ctx.fillStyle='#A09060';ctx.font='10px monospace';ctx.textAlign='center';
  ctx.fillText(inGame?'WORLD '+world:'START',dogPanX+dogPanW/2,dogPanY+dogPanH-72);
  ctx.fillStyle='#C8A040';ctx.font='bold 11px Georgia';
  ctx.fillText(inGame?'Score: '+score.toLocaleString():'Ready!',dogPanX+dogPanW/2,dogPanY+dogPanH-56);
  ctx.fillStyle='#908060';ctx.font='10px Georgia';
  ctx.fillText('Lives: '+lives,dogPanX+dogPanW/2,dogPanY+dogPanH-40);

  // PLAY button
  const _nextW=Math.min(world+1,10);
  const playLabel=inGame?('▶  PLAY  W'+_nextW):'▶  PLAY';
  const playBtnY=dogPanY+dogPanH-22;
  ctx.shadowColor='rgba(0,200,80,.6)';ctx.shadowBlur=10;
  uiBtn('play',dogPanX+6,playBtnY-14,dogPanW-12,28,playLabel,{col:'#40C860',textCol:'#C0FFD0',font:'bold 13px Georgia',sel:true,accent:'#40C860'});
  ctx.shadowBlur=0;

  // ── RIGHT PANEL: tabs + content ──
  const rpX=dogPanX+dogPanW+8,rpW=W-rpX-26,rpY=28;

  // Header
  ctx.fillStyle='#F0D060';ctx.font='bold 18px Georgia';ctx.shadowColor='rgba(200,140,0,.6)';ctx.shadowBlur=10;
  ctx.fillText(inGame?'HOKUZAN BASE CAMP':'HOKUZAN BASE CAMP',rpX+rpW/2,rpY+20);ctx.shadowBlur=0;
  ctx.fillStyle='#A08040';ctx.font='11px Georgia';
  ctx.fillText(inGame?'World '+world+' cleared!  •  🪙 '+coinBank+' coins':'🪙 '+coinBank+' coins banked',rpX+rpW/2,rpY+36);

  // Tabs
  const TABS=['UPGRADES','BUFFS','SKINS','🪙 SHOP'];
  const tabW=Math.floor((rpW-12)/4)-3,tabGap=4,tabsY=rpY+44;
  for(let t=0;t<TABS.length;t++){
    const tx=rpX+3+t*(tabW+tabGap);
    uiBtn('tab'+t,tx,tabsY,tabW,22,TABS[t],{
      col:'#C8A040',textCol:shopTab===t?'#F0E080':'#806040',
      font:(shopTab===t?'bold ':'')+'10px Georgia',sel:shopTab===t
    });
  }
  // hint removed — buttons are self-explanatory

  const contentY=tabsY+28,contentH=H-rpY-contentY+rpY-48;

  // ── TAB 0: UPGRADES ──
  if(shopTab===0){
    const tk=UKEYS.filter(k=>UPG[k].tier==='perm');
    const rh=36,pad=rpX+4;
    for(let i=0;i<tk.length;i++){
      const k=tk[i],u=UPG[k],y=contentY+i*rh;
      const sel=i===shopCursor,af=coinBank>=u.cost,mx2=u.owned>=u.max;
      uiBtn('upg'+i,pad,y,rpW-8,rh-3,''  ,{sel,dim:!af&&!mx2,col:'#C8A040'});
      ctx.textAlign='left';
      ctx.fillStyle=mx2?'#607050':af?'#F0E080':'#706050';
      ctx.font=(sel?'bold ':'')+'12px Georgia';
      ctx.fillText(u.icon+'  '+u.label,pad+10,y+13);
      ctx.fillStyle='#807060';ctx.font='10px Georgia';ctx.fillText(u.desc,pad+10,y+26);
      if(u.max>1){for(let j=0;j<u.max;j++){ctx.fillStyle=j<u.owned?'#F0C840':'#302010';ctx.fillRect(rpX+rpW-14-j*16,y+6,12,10);}}
      else{ctx.textAlign='center';ctx.fillStyle=u.owned?'#50C840':'#403020';ctx.font='bold 13px Georgia';ctx.fillText(u.owned?'✓':'—',rpX+rpW-28,y+14);}
      ctx.textAlign='right';ctx.fillStyle=mx2?'#507050':af?'#F0C840':'#803020';ctx.font='bold 12px Georgia';
      ctx.fillText(mx2?'MAX':'🪙'+u.cost,rpX+rpW-36,y+14);
    }
  }

  // ── TAB 1: BUFFS ──
  else if(shopTab===1){
    const tk=UKEYS.filter(k=>UPG[k].tier==='buff');
    const rh=38,pad=rpX+4;
    ctx.fillStyle='#5080A0';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('One-time boosts for next world only',rpX+rpW/2,contentY+10);
    for(let i=0;i<tk.length;i++){
      const k=tk[i],u=UPG[k],y=contentY+16+i*rh;
      const sel=i===shopCursor,af=coinBank>=u.cost,mx2=u.owned>=u.max;
      uiBtn('buff'+i,pad,y,rpW-8,rh-4,'',{sel,dim:!af&&!mx2,col:'#4090CC'});
      ctx.textAlign='left';
      ctx.fillStyle=mx2?'#607080':af?'#C0E0FF':'#607080';ctx.font=(sel?'bold ':'')+'12px Georgia';
      ctx.fillText(u.icon+'  '+u.label,pad+10,y+14);
      ctx.fillStyle='#607090';ctx.font='10px Georgia';ctx.fillText(u.desc,pad+10,y+26);
      ctx.textAlign='center';ctx.fillStyle=u.owned?'#50AA50':'#403020';ctx.font='bold 12px Georgia';
      ctx.fillText(u.owned?'✓':'—',rpX+rpW-50,y+13);
      ctx.textAlign='right';ctx.fillStyle=mx2?'#507050':af?'#80C8FF':'#803020';ctx.font='bold 12px Georgia';
      ctx.fillText(mx2?'MAX':'🪙'+u.cost,rpX+rpW-10,y+13);
    }
  }

  // ── TAB 2: SCORE SKINS ──
  else if(shopTab===2){
    const cols=4,cardW=Math.floor((rpW-8)/cols)-4,cardH=100,gapX=4,gapY=6;
    const startX=rpX+4;
    ctx.fillStyle='#806050';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('Reach score milestones to unlock  •  click to equip',rpX+rpW/2,contentY+10);
    for(let i=0;i<SKINS.length;i++){
      const col=i%cols,row=Math.floor(i/cols);
      const cx=startX+col*(cardW+gapX),cy=contentY+14+row*(cardH+gapY);
      const sk2=SKINS[i],unlocked=unlockedSkins.includes(i),selected=i===skinShopCursor,equipped=currentSkin===i;
      uiBtn('sk'+i,cx,cy,cardW,cardH,'',{sel:selected||equipped,dim:!unlocked,col:equipped?'#FFD700':'#C8A040'});
      if(unlocked){
        const pw=24,ph=30,px2=cx+cardW/2-pw/2,py2=cy+8;
        ctx.fillStyle=sk2.rainbow?`hsl(${frame*3%360},90%,70%)`:sk2.body;
        ctx.fillRect(px2+1,py2+ph*.25,pw-2,ph*.75);ctx.fillStyle=sk2.belly;ctx.fillRect(px2+pw*.25,py2+ph*.45,pw*.5,ph*.4);
        ctx.fillStyle=sk2.rainbow?`hsl(${(frame*3+40)%360},90%,70%)`:sk2.body;ctx.fillRect(px2+1,py2,pw-2,ph*.28);
        ctx.beginPath();ctx.moveTo(px2+2,py2);ctx.lineTo(px2,py2-6);ctx.lineTo(px2+7,py2);ctx.fill();
        ctx.beginPath();ctx.moveTo(px2+pw-8,py2);ctx.lineTo(px2+pw-2,py2-6);ctx.lineTo(px2+pw-1,py2);ctx.fill();
        ctx.fillStyle=sk2.eye;ctx.fillRect(px2+pw-7,py2+3,2,2);
        if(sk2.ghost){ctx.globalAlpha=.3;ctx.fillStyle='#80D0FF';ctx.fillRect(px2-2,py2-2,pw+4,ph+4);ctx.globalAlpha=1;}
        if(sk2.gold){ctx.globalAlpha=.15+Math.sin(frame*.1)*.08;ctx.fillStyle='#FFE840';ctx.fillRect(px2-2,py2-2,pw+4,ph+4);ctx.globalAlpha=1;}
        if(sk2.rainbow){ctx.globalAlpha=.18;ctx.fillStyle=`hsl(${frame*5%360},100%,60%)`;ctx.fillRect(px2-2,py2-2,pw+4,ph+4);ctx.globalAlpha=1;}
        if(sk2.dark){ctx.globalAlpha=.25;ctx.fillStyle='#CC00FF';ctx.fillRect(px2-2,py2-2,pw+4,ph+4);ctx.globalAlpha=1;}
        if(equipped){ctx.fillStyle='#FFD700';ctx.fillRect(cx+cardW-24,cy+2,22,12);ctx.fillStyle='#000';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText('ON',cx+cardW-13,cy+11);}
      }else{
        ctx.fillStyle='rgba(255,255,255,.08)';ctx.font='20px serif';ctx.textAlign='center';ctx.fillText('🔒',cx+cardW/2,cy+28);
        ctx.fillStyle='#806040';ctx.font='bold 9px monospace';ctx.fillText(sk2.unlock.toLocaleString()+'pts',cx+cardW/2,cy+50);
        ctx.fillStyle='#503828';ctx.font='8px monospace';ctx.fillText('score needed',cx+cardW/2,cy+62);
      }
      ctx.fillStyle=equipped?'#FFD700':unlocked?'#C8A860':'#504030';ctx.font=(equipped?'bold ':'')+'9px Georgia';ctx.textAlign='center';
      ctx.fillText(sk2.name,cx+cardW/2,cy+cardH-6);
    }
    const nextLk=SKINS.find((s,i)=>!unlockedSkins.includes(i));
    if(nextLk){ctx.fillStyle='rgba(180,140,50,.5)';ctx.font='9px monospace';ctx.textAlign='center';
      ctx.fillText('Next: "'+nextLk.name+'" at '+nextLk.unlock.toLocaleString()+' pts',rpX+rpW/2,H-contentY+contentY-14);}
  }

  // ── TAB 3: COIN SKINS ──
  else if(shopTab===3){
    const cols=6,cardW=Math.floor((rpW-8)/cols)-3,cardH=58,gapX=3,gapY=4;
    const startX=rpX+4,startY=contentY+14;
    const availH=H-startY-50;
    const rows=Math.floor(availH/(cardH+gapY));
    const pageSize=cols*rows;
    const visStart=Math.max(0,Math.floor(skinShopCursor/pageSize)*pageSize);
    ctx.fillStyle='#806050';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('🪙 '+coinBank+' coins  •  click to buy or equip  •  own=click to toggle',rpX+rpW/2,contentY+10);
    let drawn=0;
    for(let i=visStart;i<COIN_SKINS.length&&drawn<pageSize;i++){
      const col=drawn%cols,row=Math.floor(drawn/cols);
      const cx=startX+col*(cardW+gapX),cy=startY+row*(cardH+gapY);
      const cs=COIN_SKINS[i],owned=coinSkinOwned.has(i),equipped=coinSkinSelected===i,selected=i===skinShopCursor,canAfford=coinBank>=cs.cost;
      uiBtn('cs'+i,cx,cy,cardW,cardH,'',{sel:equipped||selected,dim:!owned&&!canAfford,col:equipped?'#FFD700':owned?'#40A840':'#C8A040'});
      const pw=14,ph=18,px2=cx+cardW/2-pw/2,py2=cy+3;
      const previewRainbow=cs.rainbow;
      ctx.fillStyle=previewRainbow?`hsl(${frame*3%360},90%,70%)`:cs.body;ctx.fillRect(px2+1,py2+ph*.3,pw-2,ph*.7);
      ctx.fillStyle=cs.belly;ctx.fillRect(px2+pw*.25,py2+ph*.5,pw*.5,ph*.35);
      ctx.fillStyle=previewRainbow?`hsl(${(frame*3+40)%360},90%,70%)`:cs.body;ctx.fillRect(px2+1,py2,pw-2,ph*.32);
      ctx.beginPath();ctx.moveTo(px2+1,py2);ctx.lineTo(px2-1,py2-4);ctx.lineTo(px2+5,py2);ctx.fill();
      ctx.beginPath();ctx.moveTo(px2+pw-6,py2);ctx.lineTo(px2+pw-1,py2-4);ctx.lineTo(px2+pw,py2);ctx.fill();
      ctx.fillStyle=cs.eye;ctx.fillRect(px2+pw-5,py2+2,2,2);
      if(cs.rainbow||cs.pattern==='star'){ctx.globalAlpha=.25;ctx.fillStyle=`hsl(${frame*4%360},100%,60%)`;ctx.fillRect(px2,py2,pw,ph);ctx.globalAlpha=1;}
      if(cs.ghost){ctx.globalAlpha=.25;ctx.fillStyle='#80D0FF';ctx.fillRect(px2-1,py2-1,pw+2,ph+2);ctx.globalAlpha=1;}
      if(cs.gold){ctx.globalAlpha=.15+Math.sin(frame*.12)*.08;ctx.fillStyle='#FFE840';ctx.fillRect(px2-1,py2-1,pw+2,ph+2);ctx.globalAlpha=1;}
      if(cs.dark){ctx.globalAlpha=.2;ctx.fillStyle='#CC00FF';ctx.fillRect(px2-1,py2-1,pw+2,ph+2);ctx.globalAlpha=1;}
      if(cs.aura){ctx.globalAlpha=.28;ctx.fillStyle=cs.aura;ctx.fillRect(px2-1,py2-1,pw+2,ph+2);ctx.globalAlpha=1;}
      if(equipped){ctx.fillStyle='#FFD700';ctx.fillRect(cx+cardW-16,cy+1,15,9);ctx.fillStyle='#000';ctx.font='bold 6px monospace';ctx.textAlign='center';ctx.fillText('ON',cx+cardW-8,cy+8);}
      else if(owned){ctx.fillStyle='#50C850';ctx.fillRect(cx+cardW-18,cy+1,17,9);ctx.fillStyle='#000';ctx.font='bold 6px monospace';ctx.textAlign='center';ctx.fillText('OWN',cx+cardW-9,cy+8);}
      ctx.fillStyle=equipped?'#FFD700':owned?'#80E880':canAfford?'#C8A860':'#604030';
      ctx.font='7px Georgia';ctx.textAlign='center';ctx.fillText(cs.name,cx+cardW/2,cy+cardH-15);
      ctx.fillStyle=owned?'#40A840':canAfford?'#F0C840':'#803020';ctx.font='bold 7px monospace';
      ctx.fillText(owned?'OWN':'🪙'+cs.cost,cx+cardW/2,cy+cardH-4);
      drawn++;
    }
    // Page nav buttons
    const totalPages=Math.ceil(COIN_SKINS.length/pageSize);
    const curPage=Math.floor(visStart/pageSize)+1;
    const navY=H-78;
    if(curPage>1)uiBtn('csprev',rpX+4,navY,60,20,'◀ PREV',{col:'#806040',font:'bold 10px Georgia'});
    ctx.fillStyle='rgba(150,120,50,.7)';ctx.font='10px Georgia';ctx.textAlign='center';
    ctx.fillText('Page '+curPage+'/'+totalPages,rpX+rpW/2,navY+14);
    if(curPage<totalPages)uiBtn('csnext',rpX+rpW-64,navY,60,20,'NEXT ▶',{col:'#806040',font:'bold 10px Georgia'});
    if(coinSkinSelected>=0){ctx.fillStyle='rgba(255,200,0,.7)';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('Equipped: '+COIN_SKINS[coinSkinSelected].name,rpX+rpW/2,navY+32);}
  }

  // Footer hint + particles
  // Footer: PLAY/CONTINUE button — clearly separated from content
  uiBtn('cont',rpX+rpW/2-70,H-48,140,24,bossActive?'CONTINUE ▶':'▶ PLAY',{col:'#40C860',textCol:'#C0FFD0',font:'bold 12px Georgia',sel:true,accent:'#40C860'});

  for(const p of particles){ctx.globalAlpha=p.life/p.max;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}
  ctx.globalAlpha=1;ctx.restore();ctx.textAlign='left';
}

// ── NAME ENTRY ────────────────────────────────────────
function drawNameEntry(){
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#000810');bg.addColorStop(1,'#0A0408');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<80;i++){
    const sx=(i*137.5)%W,sy=(i*97.3)%H*.75;
    ctx.globalAlpha=.3+Math.sin(frame*.04+i*.8)*.2;ctx.fillStyle='#E8F0FF';
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.globalAlpha=1;
  ctx.save();ctx.textAlign='center';
  // Title
  ctx.fillStyle='#F0D060';ctx.font='bold 36px Georgia';ctx.shadowColor='#C88000';ctx.shadowBlur=20;
  ctx.fillText('HOKKYOKU',W/2,H*.28);ctx.shadowBlur=0;
  ctx.fillStyle='#C8A040';ctx.font='bold 16px Georgia';
  ctx.fillText('SOL FANG',W/2,H*.28+30);
  // Name prompt
  ctx.fillStyle='#F0E8C0';ctx.font='18px Georgia';
  ctx.fillText('Enter your name to begin:',W/2,H*.5-20);
  // Input box
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(W/2-130,H*.5,260,38);
  ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.strokeRect(W/2-130,H*.5,260,38);
  ctx.fillStyle='#FFD700';ctx.font='bold 22px Georgia';
  ctx.fillText(lbNameInput+(Math.floor(frame/20)%2?'|':''),W/2,H*.5+26);
  // Hint
  ctx.fillStyle='#807050';ctx.font='12px Georgia';
  ctx.fillText('Type your name  •  Press ENTER to continue',W/2,H*.5+56);
  if(lbNameInput.length===0){
    ctx.fillStyle='rgba(200,160,60,.35)';ctx.font='13px Georgia';
    ctx.fillText('(up to 12 characters)',W/2,H*.5+72);
  }
  // Blink prompt
  ctx.globalAlpha=Math.floor(frame/25)%2?.8:.3;
  ctx.fillStyle='#C8A860';ctx.font='bold 14px Georgia';
  ctx.fillText(lbNameInput.length>0?'PRESS ENTER TO START':'TYPE YOUR NAME FIRST',W/2,H*.82);
  ctx.globalAlpha=1;
  ctx.restore();
}

// ── HOW TO PLAY ───────────────────────────────────────
function drawHowToPlay(){
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#020810');bg.addColorStop(1,'#0A1408');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#8A5A10';ctx.lineWidth=2;ctx.strokeRect(18,18,W-36,H-36);
  ctx.save();ctx.textAlign='center';

  // Title
  ctx.fillStyle='#F0D060';ctx.font='bold 28px Georgia';ctx.shadowColor='#C88000';ctx.shadowBlur=16;
  ctx.fillText('HOW TO PLAY',W/2,52);ctx.shadowBlur=0;

  // Controls — two columns
  const isMobileHTP='ontouchstart' in window||navigator.maxTouchPoints>0;
  const col1x=W*.25,col2x=W*.75,baseY=82,lh=26;

  ctx.fillStyle='#C8A040';ctx.font='bold 13px Georgia';
  ctx.fillText('MOVEMENT',col1x,baseY);
  ctx.fillText('ATTACKS',col2x,baseY);

  const controls=isMobileHTP?[
    // Mobile
    [['◀ ▶','Run  (ramp up for speed)'],['↓ in air','Ground Pound'],['JUMP','Jump (tap twice: double jump)'],],
    [['BITE','Bite — attacks + breaks boxes'],['SPIN','Battouga spin (collect first!)'],['★ ARMY','Call the Hokuzan Army'],['🏪','Vending machine (near one)'],],
  ]:[
    // Keyboard
    [['A / D  or  ◀ ▶','Run  (ramp up for speed)'],['W / Space','Jump  (press again: double jump)'],['↓ while airborne','Ground Pound'],['P / Esc','Pause'],['M','Mute music'],],
    [['X','Bite — attacks + breaks boxes'],['Z','Battouga spin (collect charges first!)'],['C','Call the Hokuzan Army'],['B','Vending machine (near one)'],],
  ];

  for(let col=0;col<2;col++){
    const cx=col===0?col1x:col2x;
    controls[col].forEach(([key,desc],i)=>{
      const y=baseY+18+lh*(i+1);
      ctx.fillStyle='#F0C040';ctx.font='bold 12px monospace';ctx.textAlign='center';
      ctx.fillText('['+key+']',cx,y);
      ctx.fillStyle='#C0A870';ctx.font='11px Georgia';ctx.textAlign='center';
      ctx.fillText(desc,cx,y+13);
    });
  }

  // Tips
  const tipY=baseY+18+lh*6+8;
  ctx.fillStyle='rgba(200,160,40,.15)';ctx.fillRect(36,tipY,W-72,70);

// ── TITLE SCREEN ──────────────────────────────────────
function drawTitle(){
  // Night sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#000810');sky.addColorStop(.5,'#040C1A');sky.addColorStop(1,'#0A0408');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Stars
  ctx.save();
  for(let i=0;i<120;i++){
    const sx=(i*137.5)%W,sy=(i*97.3)%H*.75;
    const twinkle=.4+Math.sin(frame*.04+i*.8)*.35;
    ctx.globalAlpha=twinkle;ctx.fillStyle='#E8F0FF';
    ctx.fillRect(sx,sy,i%5===0?2:1,i%5===0?2:1);
  }
  ctx.globalAlpha=1;

  // Shooting star — streaks across every ~240 frames
  const sPhase=(frame%480);
  if(sPhase<80){
    const prog=sPhase/80;const sx2=prog*W+100,sy2=80+prog*30;
    ctx.globalAlpha=(1-prog)*.9;ctx.strokeStyle='#C8E8FF';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(sx2-80*(1-prog*.3),sy2-8*(1-prog*.3));ctx.stroke();
    ctx.globalAlpha=.4*(1-prog);ctx.strokeStyle='#FFFFFF';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(sx2-120*(1-prog*.3),sy2-12*(1-prog*.3));ctx.stroke();
    ctx.globalAlpha=1;
  }

  // Aurora shimmer behind mountains
  for(let i=0;i<3;i++){
    const ax=(i*220+frame*.4)%W,aAlpha=.07+Math.sin(frame*.025+i*2)*.04;
    ctx.globalAlpha=aAlpha;
    const ag=ctx.createLinearGradient(ax-80,H*.2,ax+80,H*.65);
    ag.addColorStop(0,'rgba(0,0,0,0)');ag.addColorStop(.3,`hsl(${160+i*40},70%,45%)`);ag.addColorStop(.7,`hsl(${200+i*30},60%,35%)`);ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ag;ctx.fillRect(ax-80,H*.2,160,H*.45);
  }
  ctx.globalAlpha=1;

  // Moon — large red/amber moon (Ohu Mountains style)
  const moonX=W*.82,moonY=H*.22;
  const moonG=ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,52);
  moonG.addColorStop(0,'#E8C090');moonG.addColorStop(.6,'#C87840');moonG.addColorStop(1,'rgba(160,60,20,0)');
  ctx.fillStyle=moonG;ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(moonX,moonY,52,0,6.28);ctx.fill();
  ctx.globalAlpha=.55;ctx.fillStyle='#D47030';ctx.beginPath();ctx.arc(moonX,moonY,42,0,6.28);ctx.fill();
  ctx.globalAlpha=1;

  // Mountain layers (Ohu Mountains silhouettes, parallax)
  const mLayers=[
    {y:H*.55,col:'#080C14',pts:[[0,0],[80,-70],[160,-30],[260,-90],[380,-50],[480,-110],[560,-40],[660,-85],[760,-55],[800,0]]},
    {y:H*.65,col:'#060810',pts:[[0,0],[60,-55],[140,-20],[220,-75],[320,-40],[420,-90],[500,-30],[600,-65],[720,-45],[800,0]]},
    {y:H*.72,col:'#040608',pts:[[0,0],[50,-40],[120,-15],[200,-60],[300,-30],[400,-70],[520,-25],[640,-50],[800,0]]},
  ];
  for(const ml of mLayers){
    ctx.fillStyle=ml.col;ctx.beginPath();ctx.moveTo(0,ml.y);
    for(const[dx,dy]of ml.pts)ctx.lineTo(dx,ml.y+dy);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  }

  // Snow on nearest mountain peaks
  ctx.fillStyle='rgba(220,228,240,.55)';
  for(const[dx,dy]of mLayers[0].pts){
    if(dy<-50){const py2=mLayers[0].y+dy;ctx.beginPath();ctx.moveTo(dx,py2);ctx.lineTo(dx-20,py2+22);ctx.lineTo(dx+20,py2+22);ctx.closePath();ctx.fill();}
  }

  // Ground fog
  const fog=ctx.createLinearGradient(0,H*.72,0,H);fog.addColorStop(0,'rgba(0,0,0,0)');fog.addColorStop(1,'rgba(8,12,20,.9)');
  ctx.fillStyle=fog;ctx.fillRect(0,H*.72,W,H*.28);

  // Gin silhouette running along bottom ridge
  const ginX=W*.12+Math.sin(frame*.018)*8,ginY=H*.77;
  const runPhase=Math.sin(frame*.22);
  ctx.fillStyle='rgba(180,195,220,.88)';ctx.save();
  // Body
  ctx.beginPath();ctx.ellipse(ginX+16,ginY-12,18,10,-.15,0,6.28);ctx.fill();
  // Head+snout
  ctx.beginPath();ctx.ellipse(ginX+30,ginY-18,9,8,.1,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(ginX+37,ginY-15,5,4,.2,0,6.28);ctx.fill();
  // Ears
  ctx.beginPath();ctx.moveTo(ginX+26,ginY-24);ctx.lineTo(ginX+22,ginY-32);ctx.lineTo(ginX+30,ginY-24);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(ginX+31,ginY-24);ctx.lineTo(ginX+35,ginY-31);ctx.lineTo(ginX+38,ginY-24);ctx.closePath();ctx.fill();
  // Legs (animated)
  ctx.fillRect(ginX+4,ginY-4+runPhase*4,5,12);ctx.fillRect(ginX+12,ginY-4-runPhase*4,5,12);
  ctx.fillRect(ginX+20,ginY-4+runPhase*3,5,12);ctx.fillRect(ginX+28,ginY-4-runPhase*3,5,12);
  // Tail (curled up)
  ctx.strokeStyle='rgba(180,195,220,.88)';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(ginX,ginY-10);ctx.bezierCurveTo(ginX-12,ginY-18,ginX-8,ginY-26,ginX+2,ginY-22);ctx.stroke();
  ctx.restore();
  // Gin speed lines
  ctx.globalAlpha=.18;ctx.strokeStyle='#C8D8E8';ctx.lineWidth=1;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(ginX-20-i*14,ginY-8-i*2.5);ctx.lineTo(ginX-40-i*14,ginY-8-i*2.5);ctx.stroke();}
  ctx.globalAlpha=1;

  // ── TITLE TEXT ──
  ctx.save();ctx.textAlign='center';
  // Red decorative lines
  ctx.strokeStyle='rgba(160,30,10,.6)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W*.1,H*.34);ctx.lineTo(W*.9,H*.34);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W*.1,H*.62);ctx.lineTo(W*.9,H*.62);ctx.stroke();

  // Main title glow
  ctx.shadowColor='rgba(200,120,20,.8)';ctx.shadowBlur=32;
  ctx.fillStyle='#F4E0A0';ctx.font='bold 58px Georgia';
  ctx.fillText('HOKKYOKU',W/2,H*.5-4);
  ctx.shadowBlur=0;
  // Subtitle line
  ctx.fillStyle='rgba(200,170,80,.7)';ctx.font='14px Georgia';
  ctx.fillText('〜  Sol Fang  〜',W/2,H*.5+22);
  // English subtitle
  ctx.fillStyle='rgba(160,130,60,.6)';ctx.font='12px monospace';
  ctx.fillText('HOKKYOKU: SOL FANG',W/2,H*.5+42);

  // Easter egg ? button — subtle, bottom-left corner
  const eggAlpha=0.18+Math.sin(frame*.04)*.06;
  ctx.globalAlpha=eggAlpha;
  ctx.fillStyle='#C8A040';ctx.font='bold 13px Georgia';ctx.textAlign='left';
  ctx.fillText('?',14,H-14);
  ctx.globalAlpha=1;
  lobbyBtns['easter_egg']={x:8,y:H-26,w:22,h:20};

  // ── BUTTONS — stacked vertically, no overlap ──
  const btnBaseY = H*0.60;
  // PLAY  (h=36)
  ctx.shadowColor='rgba(0,200,80,.5)';ctx.shadowBlur=12;
  uiBtn('play_btn',W/2-90,btnBaseY,180,36,'▶  PLAY',{col:'#40C860',textCol:'#C0FFD0',font:'bold 16px Georgia',sel:true,accent:'#40C860'});
  ctx.shadowBlur=0;
  // LOBBY  (gap 10px → y = btnBaseY+46)
  uiBtn('lobby_btn',W/2-90,btnBaseY+46,180,28,'🎒  LOBBY / SHOP',{col:'#C8A040',textCol:'#F0E080',font:'bold 12px Georgia'});
  // LEADERBOARD (gap 10px → y = btnBaseY+84)
  uiBtn('lb_btn',W/2-80,btnBaseY+84,160,28,'🏆  LEADERBOARD',{col:'rgba(200,160,40,.5)',textCol:'rgba(220,180,60,.9)',font:'bold 12px Georgia'});
  // HOW TO PLAY
  uiBtn('htp_btn',W/2-70,btnBaseY+122,140,24,'?  HOW TO PLAY',{col:'rgba(140,100,40,.5)',textCol:'rgba(180,140,60,.8)',font:'10px Georgia'});

  // Feature line — below all buttons
  ctx.fillStyle='rgba(140,110,50,.5)';ctx.font='10px monospace';ctx.textAlign='center';
  ctx.fillText('10 Worlds · Checkpoints · Hokuzan Army · Score Skins · Giga Kiba',W/2,btnBaseY+156);
  // Daily bonus notification
  if(window._dailyBonus){
    const db=window._dailyBonus;
    const pulse=0.7+Math.sin(frame*.08)*.3;
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#F0C840';ctx.font='bold 11px Georgia';
    ctx.fillText(`🌅 Daily Login Bonus: +${db.coins} 🪙  (Day ${db.streak} streak!)`,W/2,btnBaseY+175);
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

function render(){
  // I153: hide touch controls during menus
  const _tui=document.getElementById('touch-ui');
  if(_tui){const _menuState=['title','howtoplay','nameentry','lobby','leaderboard','dead','timeover','gameover'].includes(state);_tui.style.visibility=_menuState?'hidden':'visible';}
  if(state==='nameentry'){drawNameEntry();return;}
  if(state==='howtoplay'){drawHowToPlay();return;}
  if(state==='title'){drawTitle();drawEasterEgg();return;}
  if(state==='intro'){drawIntro();return;}
  if(state==='lobby'){drawLobby();return;}
  if(state==='leaderboard'){drawLeaderboard();return;}
  const sx=screenShake>0?Math.sin(frame*1.8)*(screenShake*.5):0,sy=screenShake>0?Math.cos(frame*2.1)*(screenShake*.3):0;
  ctx.save();ctx.translate(sx,sy);
  if(inArena){
    drawArena();
  } else {
    drawBg();drawGajou();drawPines();
    const sc2=Math.max(0,Math.floor(camX/TILE)-1),ec=Math.min(LCOLS,sc2+Math.ceil(W/TILE)+4);
    for(let r=0;r<ROWS;r++)for(let c=sc2;c<ec;c++){
      const t=sg(r,c);if(t==='.'||t==='T'||t==='P')continue;
      const ck=r+','+c;
      if(crumbleTiles[ck]&&crumbleTiles[ck]<30&&Math.floor(frame/4)%2===0){ctx.globalAlpha=.4;ctx.fillStyle='#FF8800';ctx.fillRect(c*TILE-camX,r*TILE,TILE,TILE);ctx.globalAlpha=1;}
      const ba=bumpAnims.find(b=>b.c===c&&b.r===r);
      drawTile(t,c*TILE-camX,r*TILE,ba?ba.t:0);
    }
  }
  drawShockwaves();drawItems();drawRocks();drawFB();drawAllies();drawBoss();drawEnemies();drawGin();
  for(const p of particles){ctx.globalAlpha=p.life/p.max;ctx.fillStyle=p.col;ctx.fillRect(p.x-camX-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}
  ctx.globalAlpha=1;ctx.textAlign='center';
  for(const f of floats){ctx.globalAlpha=f.life/f.max;ctx.fillStyle=f.col;ctx.font='bold 14px Georgia';ctx.fillText(f.txt,f.x-camX,f.y);}
  ctx.globalAlpha=1;ctx.textAlign='left';
  ctx.restore();
  // ── SCREEN TRANSITION FADE ──
  if(transitionAlpha>0){
    ctx.save();ctx.globalAlpha=Math.min(1,transitionAlpha);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  // ── AKAGUMA intro cinematic
  if(bossType==='akaguma'&&akaIntro>0){
    const t=akaIntro/180;
    ctx.fillStyle=`rgba(0,0,0,${t*.9})`;ctx.fillRect(0,0,W,H);
    ctx.save();ctx.textAlign='center';
    ctx.globalAlpha=1-t*.3;
    ctx.fillStyle='#FF2200';ctx.shadowColor='#FF0000';ctx.shadowBlur=30;
    ctx.font='bold 36px Georgia';ctx.fillText('赤カブト',W/2,H/2-30);
    ctx.shadowBlur=0;ctx.fillStyle='#F0C840';ctx.font='bold 20px Georgia';
    ctx.fillText('AKAGUMA',W/2,H/2+10);
    ctx.fillStyle='rgba(200,160,50,.7)';ctx.font='14px Georgia';
    ctx.fillText('The Demon Bear of the Hokuzan Mountains',W/2,H/2+38);
    ctx.restore();
  }
  // Phase 3 cliff warning overlay
  if(bossType==='akaguma'&&akaCliffKill&&Math.floor(frame/20)%2===0){
    ctx.save();ctx.fillStyle='rgba(255,220,0,.12)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.fillStyle='#FFFF00';ctx.font='bold 14px Georgia';
    ctx.shadowColor='#000';ctx.shadowBlur=4;
    ctx.fillText('⚠  PHASE 3 — LURE AKAGUMA TO THE CLIFF EDGE  →  ⚠',W/2,H-75);
    ctx.shadowBlur=0;ctx.restore();
  }
  // Dark overlay AFTER restore — needs clean unshifted context
  drawDark();
  // HUD and vend drawn AFTER dark overlay so they're always visible
  drawHUD();
  if(vendActive)drawVend();
  if(state==='dead')drawOverlay('SOL FALLS...',inArena?'PRESS SPACE TO RETRY BOSS ARENA':'PRESS SPACE TO RETRY WORLD '+world,'Lives: '+lives+'  |  Bank: 🪙'+coinBank+(checkpointReached&&!inArena?' [checkpoint saved]':''));
  else if(state==='gameover')drawOverlay('AKAGUMA WINS','PRESS SPACE TO TRY AGAIN  |  Leaderboard in 4s...','Score: '+score.toLocaleString()+'  |  Reached World '+world+'  |  赤熊 defeated you','#CC6040');
  else if(state==='timeover'){
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.textAlign='center';
    ctx.fillStyle='#FF4400';ctx.font='bold 52px Georgia';ctx.shadowColor='#FF2200';ctx.shadowBlur=30;
    ctx.fillText('TIME OVER',W/2,H/2-20);ctx.shadowBlur=0;
    ctx.fillStyle='#F0D060';ctx.font='bold 18px Georgia';
    ctx.fillText('World '+world+'  —  '+timeLeft+'s remaining',W/2,H/2+20);
    ctx.fillStyle='rgba(255,80,0,.6)';ctx.font='13px Georgia';
    ctx.fillText('Lives: '+lives+'  |  Bank: 🪙'+coinBank,W/2,H/2+48);
    ctx.restore();
  }
  if(paused){
    lobbyBtns={};
    ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.textAlign='center';
    // Panel
    ctx.fillStyle='rgba(20,14,6,.9)';ctx.fillRect(W/2-130,H/2-80,260,200);
    ctx.strokeStyle='rgba(200,160,40,.6)';ctx.lineWidth=2;ctx.strokeRect(W/2-130,H/2-80,260,200);
    // Title
    ctx.fillStyle='#FFD700';ctx.font='bold 36px Georgia';ctx.shadowColor='#FF8800';ctx.shadowBlur=16;
    ctx.fillText('PAUSED',W/2,H/2-46);ctx.shadowBlur=0;
    // Divider
    ctx.strokeStyle='rgba(200,160,40,.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W/2-110,H/2-28);ctx.lineTo(W/2+110,H/2-28);ctx.stroke();
    // Buttons stacked: RESUME, MUTE, LOBBY — 36px tall, 10px gap
    const bx=W/2-100,bw=200,bh=36,gap=10;
    const b1y=H/2-18, b2y=b1y+bh+gap, b3y=b2y+bh+gap;
    uiBtn('pause_resume',bx,b1y,bw,bh,'\u25b6  RESUME',      {col:'#40C860',textCol:'#C0FFD0',font:'bold 14px Georgia',sel:true,accent:'#40C860'});
    uiBtn('pause_mute',  bx,b2y,bw,bh,AU.muted?'\ud83d\udd0a  UNMUTE':'\ud83d\udd07  MUTE',{col:'#4080C0',textCol:'#C0D8FF',font:'bold 14px Georgia'});
    uiBtn('pause_lobby', bx,b3y,bw,bh,'\ud83c\udf92  EXIT TO LOBBY',{col:'#C84040',textCol:'#FFD0D0',font:'bold 14px Georgia'});
    // Hint
    ctx.fillStyle='rgba(160,140,80,.45)';ctx.font='10px monospace';
    ctx.fillText('[P/ESC] resume  [M] mute  [L] lobby',W/2,b3y+bh+12);
    ctx.restore();
  }
}

// ── BOOT ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(state==='howtoplay'){state='title';return;}
  if(e.code==='Space'&&state==='timeover')return;
  if(e.code==='Space'&&state==='dead'){respawnInWorld();return;}
  if(e.code==='Space'&&(state==='title'||state==='gameover'))startGame();
  if(e.code==='KeyL'&&state==='title'){openLobbyFromTitle();return;}
  if(e.code==='Escape'&&state==='lobby')continueFromShop();
  if(e.code==='Escape'&&state==='leaderboard'&&!lbEntering){state='title';}
  if(e.code==='Escape'&&vendActive){vendActive=false;}
});
// ── TOUCH CONTROLS ───────────────────────────────────
(function(){
  const isTouch='ontouchstart' in window||navigator.maxTouchPoints>0;
  if(!isTouch)return;

  document.getElementById('touch-ui').style.display='block';
  document.getElementById('k').style.display='none';

  function scaleCanvas(){
    const vw=window.innerWidth, vh=window.innerHeight;
    const portrait=vh>vw;
    let fitScale;
    if(portrait){
      // B274: constrain by height too so canvas isn't tiny on phones
      fitScale=Math.min(vw/800,(vh*0.52)/480);
    } else {
      fitScale=Math.min(vw/800, vh/480);
    }
    CV.style.width=(800*fitScale)+'px';
    CV.style.height=(480*fitScale)+'px';
    // B304/I139: DPR scaling for sharp canvas on retina/HiDPI screens
    const dpr=window.devicePixelRatio||1;
    CV.width=800*dpr; CV.height=480*dpr;
    ctx.scale(dpr,dpr);
  }
  scaleCanvas();
  window.addEventListener('resize',scaleCanvas);
  window.addEventListener('orientationchange',()=>setTimeout(scaleCanvas,120));

  const BTN_KEYS={
    'btn-left' :['ArrowLeft','KeyA'],
    'btn-right':['ArrowRight','KeyD'],
    'btn-down' :['ArrowDown','KeyS'],
    'btn-jump' :['Space'],
    'btn-bite' :['KeyX'],
    'btn-spin' :['KeyZ'],
    'btn-army' :['KeyC'],
    'btn-vend' :['KeyB'],
    'btn-pause':['KeyP'],
  };

  const touchMap={};
  const heldBtns=new Set();

  function pressBtn(btnId){
    if(heldBtns.has(btnId))return;
    heldBtns.add(btnId);
    const el=document.getElementById(btnId);
    if(el)el.classList.add('pressed');
    const codes=BTN_KEYS[btnId]||[];
    codes.forEach(code=>{if(!keys[code])just[code]=true;keys[code]=true;});
  }

  function releaseBtn(btnId){
    if(!heldBtns.has(btnId))return;
    heldBtns.delete(btnId);
    const el=document.getElementById(btnId);
    if(el)el.classList.remove('pressed');
    const codes=BTN_KEYS[btnId]||[];
    codes.forEach(code=>{keys[code]=false;});
  }

  function getBtnId(x,y){
    const el=document.elementFromPoint(x,y);
    if(!el)return null;
    if(el.classList.contains('touch-btn'))return el.id;
    if(el.parentElement&&el.parentElement.classList.contains('touch-btn'))return el.parentElement.id;
    return null;
  }

  const ui=document.getElementById('touch-ui');
  ui.addEventListener('touchstart',e=>{
    AU.init();AU.resume();
    e.preventDefault();
    for(const t of e.changedTouches){
      const btn=getBtnId(t.clientX,t.clientY);
      if(btn){touchMap[t.identifier]=btn;pressBtn(btn);}
    }
  },{passive:false});

  ui.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const newBtn=getBtnId(t.clientX,t.clientY);
      const oldBtn=touchMap[t.identifier];
      if(oldBtn&&oldBtn!==newBtn){releaseBtn(oldBtn);delete touchMap[t.identifier];}
      if(newBtn&&newBtn!==oldBtn){touchMap[t.identifier]=newBtn;pressBtn(newBtn);}
    }
  },{passive:false});

  function endTouch(e){
    e.preventDefault();
    for(const t of e.changedTouches){
      const btn=touchMap[t.identifier];
      if(btn){releaseBtn(btn);delete touchMap[t.identifier];}
    }
  }
  ui.addEventListener('touchend',endTouch,{passive:false});
  ui.addEventListener('touchcancel',endTouch,{passive:false});

  // ── Canvas touch: delegates to unified handler ──
  function canvasTap(cx,cy){
    const rect=CV.getBoundingClientRect();
    const gx=(cx-rect.left)*(W/rect.width);
    const gy=(cy-rect.top)*(H/rect.height);
    // Vending machine in-game — special inline handling
    if(state==='playing'&&vendActive){
      if(gy<H/2-125||gy>H/2+135){vendActive=false;return;}
      for(let i=0;i<VEND_ITEMS.length;i++){
        const iy=H/2-55+i*38;
        if(gy>=iy-20&&gy<=iy+14){
          vendCursor=i;const vi=VEND_ITEMS[i];
          if(coins>=vi.cost){coins-=vi.cost;activatePow(vi.type);burst(P.x+gW()/2,P.y+gH()/2,15,'#F0C840',6);AU.play('vend');}
          return;
        }
      }
      return;
    }
    handleUIClick(gx,gy);
  }

  CV.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){canvasTap(t.clientX,t.clientY);}
  },{passive:false});
})();

// Boot — always start game loop, don't let loadLB failure block anything
try{timeLeft=500;buildMap(1);buildEnemies(1);resetP();}catch(e){console.error('Boot error',e);}
loadLB().catch(()=>{lbEntries=[];});
function loop(){try{update();}catch(e){console.error(e);}try{render();}catch(e){console.error(e);}requestAnimationFrame(loop);}
// B281/I119: auto-pause when tab hidden (prevents timer deaths + battery drain)
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&state==='playing'&&!paused)togglePause();
});
loop();
</script>
